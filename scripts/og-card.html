<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  html,body{width:1200px;height:630px}
  body{background:#ffffff;color:#16181d;padding:64px 72px;position:relative;overflow:hidden}
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(#eef2f7 1px,transparent 1px),linear-gradient(90deg,#eef2f7 1px,transparent 1px);background-size:48px 48px;opacity:.6}
  .accent{position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#dbe5ff,#eff4ff 70%);opacity:.7}
  .inner{position:relative}
  .brand{display:flex;align-items:center;gap:12px;font-size:24px;font-weight:700;color:#16181d;letter-spacing:-.01em}
  .brand .dot{color:#2563eb;font-size:22px}
  h1{font-size:74px;line-height:1.04;letter-spacing:-.03em;margin-top:48px;max-width:18ch}
  .sub{font-size:30px;color:#5b616e;margin-top:24px;max-width:30ch;line-height:1.35}
  .rows{position:absolute;right:72px;bottom:120px;width:430px}
  .row{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border:1px solid #e5e7eb;
    border-radius:14px;background:#fafafa;margin-bottom:14px}
  .row .nm{font-size:26px;font-weight:700}
  .row .mv{font-family:ui-monospace,Menlo,monospace;font-size:24px;color:#5b616e}
  .row .mv b{color:#16181d}
  .row .up{color:#059669;font-weight:700}
  .foot{position:absolute;left:72px;bottom:54px;font-size:24px;color:#9aa1ad;font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
  <div class="grid-bg"></div><div class="accent"></div>
  <div class="inner">
    <div class="brand">CoD Major Wins <span class="dot">◆</span> Era-Adjusted</div>
    <h1>Who really dominated Call&nbsp;of&nbsp;Duty?</h1>
    <div class="sub">Major tournament wins, re-weighted so every season counts equally.</div>
  </div>
  <div class="rows">
    <div class="row"><span class="nm">Crimsix</span><span class="mv">38 → <b>26.1</b></span></div>
    <div class="row"><span class="nm">Simp</span><span class="mv">14 → <b>19.0</b> <span class="up">▲</span></span></div>
    <div class="row"><span class="nm">HyDra</span><span class="mv">8 → <b>12.1</b> <span class="up">▲16</span></span></div>
  </div>
  <div class="foot">cod-stats-one.vercel.app</div>
</body>
</html>
