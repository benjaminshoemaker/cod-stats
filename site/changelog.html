// Newest first. Tags: Methodology (moves the numbers) | New | Improved | Changed | Fixed.
const ENTRIES = [
  {date:'2026-07-14', tag:'Improved', title:'Design-system and chart accessibility pass',
   body:`GOAT Builder now uses the shared site spacing, typography, color tokens, and mobile tap-target sizing.
   Chart interactions were tightened so Peak vs Longevity points have larger hit areas and Career Trajectories lines
   can be focused and pinned from the keyboard. Low-emphasis and championship-marker text colors now keep stronger
   contrast on tinted surfaces. Rankings, scores, and methodology are unchanged.`},
  {date:'2026-07-14', tag:'New', title:'GOAT Builder Champs scenarios',
   body:`Added a temporary Champs scenario panel to the <a href="goat-builder.html">GOAT Builder</a>. Pick a current
   Black Ops 7 roster to see how those players move in your active GOAT ranking if they win Champs. The scenario uses
   the existing six-major BO7 denominator, exact-fraction ranks, current roster rows from the latest played BO7 major,
   and the weights, ring value, and title filter currently selected in the builder. Current rankings are unchanged.`},
  {date:'2026-07-14', tag:'Improved', title:'Community and methodology copy tightened',
   body:`Community Consensus and methodology copy now uses more direct language around source trails,
   community rankings, poll margins, and excluded sources. The older table-system changelog wording was also
   made less internal. Rankings, scores, and methodology are unchanged.`},
  {date:'2026-07-14', tag:'Improved', title:'GOAT Builder linked in navigation',
   body:`The <a href="goat-builder.html">GOAT Builder</a> is now available from the global navigation instead of
   only through direct links. Rankings, weights, and scoring are unchanged.`},
  {date:'2026-07-08', tag:'Improved', title:'Community Consensus source margins',
   body:`The <a href="community.html">Community Consensus</a> title tables no longer show score-derived "close race"
   labels. Older multi-source title pages now label the score as <strong>Consensus strength</strong>, because that number
   captures source-weighted support across several scored sources. Single aggregate-poll title pages show
   <strong>Poll detail</strong> instead, with a compact first-place or next-best vote bucket, or top-10 inclusion share
   pulled from each preserved poll image. Scores and rankings are unchanged.`},
  {date:'2026-07-07', tag:'Changed', title:'Site renamed to Map Five',
   body:`The site now uses the <strong>Map Five</strong> name and the canonical domain
   <a href="https://mapfive.app/">mapfive.app</a>. Page metadata, share images, canonical URLs, the sitemap, and the
   old Vercel hostname redirect now point at the new domain. Rankings, methodology, and source data are unchanged.`},
  {date:'2026-07-07', tag:'Methodology', title:'Black Ops 4 denominator corrected to six majors',
   body:`CWL Pro League 2019 was removed from the Black Ops 4 major list because the source row is the Pro League
   match-bonus/league page, not a tournament with a champion. The BO4 season now counts six majors: Vegas, Fort Worth,
   London, Anaheim, Pro League Playoffs, and Champs. Raw major wins are unchanged, but BO4 season weight changes from
   1/7 to 1/6 per win, and the all-era rescale shifts slightly. Biggest adjusted-win gains: Prestinni 4.46 -> 4.84
   (+0.38, +8.5%, rank 47 -> 42), Enable 5.97 -> 6.34 (+0.37, +6.2%), SlasheR 9.05 -> 9.40 (+0.35, rank 23 -> 21),
   Octane 9.95 -> 10.29 (+0.34, rank 19 -> 18), Priestahh 10.90 -> 11.24 (+0.34, rank 16 -> 13), Arcitys 11.12 ->
   11.45 (+0.33, rank 14 -> 11), Clayster 12.47 -> 12.80 (+0.33), and Kenny 11.73 -> 12.06 (+0.33).`},
  {date:'2026-07-07', tag:'Methodology', title:'GOAT Builder now opens on the Balanced recipe',
   body:`The <a href="goat-builder.html">GOAT Builder</a> default weights changed from an even 25% per lane to the
   Balanced preset: 50% Resume, 30% Individual Skill, 10% Longevity, 10% Peak. This moves the default ranking below
   the top spots; shared links with explicit weights are unaffected. The default and the Balanced preset are now the
   same definition in code, so they cannot drift apart.`},
  {date:'2026-07-07', tag:'Improved', title:'Every number explains itself',
   body:`Following a reader comprehension test, the main pages now show their work in place. On the
   <a href="index.html">leaderboard</a>, clicking any Adjusted value expands that player's season-by-season math
   (won X of Y majors = season-share, summed and rescaled), the column key defines Peak and Eras, and the legend notes
   that ring weighting is a preference with a neutral ×1 default. <a href="kor.html">Kills Over Replacement</a> now
   states its qualification bar and that the replacement percentile covers everyone who qualifies (low-sample players
   included), shows opponent-strength medians in one consistent format, and counts "qualified seasons" honestly on the
   all-time board. <a href="community.html">Community Consensus</a> explains that the overall score is a career total
   while average rank compares per-title peaks, and defines the Top 1/3/5/10 columns. Scores and rankings are unchanged.`},
  {date:'2026-07-07', tag:'New', title:'KOR event-by-event traces with map-level drilldown',
   body:`Every row on the <a href="kor.html">Kills Over Replacement</a> board now expands (click, or Enter on a
   focused row) into an event-by-event trace of that season: each major's maps, real kills–deaths, K/map, KOR vs the
   title/mode baseline, and the placement there — so you can see whether a great season was elite every weekend or
   carried by one hot tournament. Each event expands further into its match-level maps: every map's name, mode,
   opponent, and kills–deaths, with other-mode maps shown dimmed since they count on their own split's board.
   Traces load on demand, cover every qualified row, and their kills, deaths, and maps sum exactly to the row's
   aggregates. Scores, baselines, and rankings are unchanged.`},
  {date:'2026-07-07', tag:'Improved', title:'Community Consensus readability and mobile pass',
   body:`The <a href="community.html">Community Consensus</a> page now explains its own vocabulary: confidence pills,
   "close race" flags, and ledger statuses carry plain-language definitions, backed by a new
   <a href="methodology.html#community-confidence">confidence section</a> in the methodology. Traces lead with what each
   source actually said ("Ranked #3 of 30") before the weighting math, and the source ledger shows survey ballot counts
   and season coverage. Ranking tables show scores to 2 decimals (traces keep exact values), the repeated "not scored"
   cell labels were consolidated into one header note, per-title rows are clickable like overall rows, and on phones the
   trace opens at its heading with a back-to-ranking link plus a sideways-scroll hint on the overall table. Shared links
   now always include the selected player. Underlying scores and rankings are unchanged.`},
  {date:'2026-07-07', tag:'Improved', title:'Kills Over Replacement page usability',
   body:`The <a href="kor.html">Kills Over Replacement</a> board now uses the same sortable table as the leaderboard:
   click any column header to re-sort, with rank and player staying pinned while the table scrolls sideways on phones.
   The replacement baseline appears as a highlighted in-table row that keeps its place under any sort. Single-title views
   drop the repeated Role, Title, and Replacement columns (Role remains in the all-titles view). New on-page notes state
   the coverage start (no per-map kill data before Black Ops 2; Modern Warfare 3 qualifies no one and was removed from
   the title menu), a plain-English reading of the KOR number, the low-sample thresholds, and a warning where a title's
   qualified pool is too small to trust the baseline tightly. The leaderboard and player pages now link to the board.
   Scores, baselines, and rankings are unchanged.`},
  {date:'2026-07-06', tag:'Improved', title:'Community overall trace matches per-title layout',
   body:`The <a href="community.html">Community Consensus</a> overall view now uses the same table-plus-trace layout as
   the per-title view: selecting a player updates a side trace instead of expanding the table row. The trace lists every
   retained title chronologically, links each title to its per-title evidence, and keeps event wins marked as non-scoring
   context. The overall table now includes played title count beside average rank. The confusing overall ranking mode
   dropdown was removed; the overall page now shows the single career-total community score.`},
  {date:'2026-07-06', tag:'Improved', title:'Reusable horizontal table scrolling',
   body:`Wide tables now share one horizontal-scroll handler for focusable regions, keyboard scrolling, shift-wheel
   scrolling, and edge-state cues. The leaderboard's Tabulator table uses the same handler as plain data tables, so
   future scroll fixes can land in one shared place. Rankings and scores are unchanged.`},
  {date:'2026-07-06', tag:'Fixed', title:'Default view URLs stay clean',
   body:`Community Consensus and Kills Over Replacement now match the leaderboard's URL behavior:
   the URL remains bare for default views, while non-default filters and selections still round-trip in shared links.
   Rankings and scores are unchanged.`},
  {date:'2026-07-06', tag:'Changed', title:'Leaderboard stat columns removed',
   body:`The main leaderboard no longer offers on-record K/D, kills, deaths, interactions, maps, or stat-event columns
   in the Columns menu. Those objective-stat views remain on the dedicated player, compare, similarity, and Kills Over
   Replacement pages where the coverage context is visible. Rankings and era-adjusted totals are unchanged.`},
  {date:'2026-07-06', tag:'New', title:'Community Consensus overall rollup',
   body:`The <a href="community.html">Community Consensus</a> page now opens with an overall career rollup, including
   career total, per-played-title, and per-ranked-title views. The overall view includes the same era selector pattern as
   the leaderboard and expands a player trace when a row is selected. The overall table now uses average rank across played
   titles, counting played-but-unranked titles as rank 31, while the trace keeps each title linked back to the per-title
   evidence where the source math lives. Event wins remain visible as non-scoring resume context.`},
  {date:'2026-07-06', tag:'New', title:'Authored-list consensus check',
   body:`A new <a href="authored-vs-community.html">Authored-list check</a> insight compares player/media lists
   against the Community Consensus rankings. The finding: authored lists mostly confirm the community list, so they
   are now treated as corroboration rather than a separate leaderboard or blended score. Rankings are unchanged.`},
  {date:'2026-07-06', tag:'Improved', title:'Community consensus source-depth note',
   body:`The <a href="methodology.html#community-consensus">community consensus methodology</a> now states that recent
   titles may rely on one large community poll with thousands of votes, while older-title rankings are reconstructed from
   smaller preserved community evidence. Scores and rankings are unchanged.`},
  {date:'2026-07-06', tag:'Improved', title:'Methodology hub',
   body:`The <a href="methodology.html">methodology</a> page now opens with a lane-based hub for era-adjusted wins,
   community consensus, objective stats, and formal accolades. Existing deep links still jump directly to the detailed
   sections. Rankings and scores are unchanged.`},
  {date:'2026-07-06', tag:'Fixed', title:'Gunless Black Ops 4 role',
   body:`Gunless is now listed as <strong>Flex</strong> for Black Ops 4 while remaining <strong>SMG</strong> for
   World War II and Modern Warfare. This updates role labels on player, compare, leaderboard, and Kills Over Replacement
   views only; rankings and era-adjusted totals are unchanged.`},
  {date:'2026-07-06', tag:'New', title:'Community Consensus page',
   body:`A new <a href="community.html">Community Consensus</a> page shows source-backed per-title community rankings with
   title selection, event-win sanity context, selected-player source traces, and a source ledger for scored, reviewed, and
   excluded evidence. The <a href="methodology.html#community-consensus">methodology</a> explains the scoring boundary:
   these are compiled community rankings, not site-authored rankings, and event wins are shown only as context. Era-adjusted
   wins rankings are unchanged.`},
  {date:'2026-07-06', tag:'Improved', title:'Tighter data table design system',
   body:`The Kills Over Replacement page, season tables, player profile tables, compare tables, and heatmap table alternative now use
   the same accessible table wrapper: labeled horizontal-scroll regions, screen-reader captions, scoped table headers, and
   globally-sized segmented controls. The style guide now documents the KOR widget, role pills, and reusable table helpers. Rankings
   and stats are unchanged.`},
  {date:'2026-07-06', tag:'New', title:'Kills Over Replacement leaderboard',
   body:`A new <a href="kor.html">Kills Over Replacement</a> page under Insights ranks major-event kill production
   above a title-and-mode replacement baseline. It shows separate <strong>Respawn KOR/map</strong> and
   <strong>S&amp;D KOR/map</strong> leaderboards, all-time and by title, with role labels, maps, events, replacement baselines,
   median opponent placement, and top-8 opponent map share as context. The <a href="methodology.html#kills-over-replacement">methodology</a>
   explains the formula, qualification filters, and limits. This is an on-record stats view only; it does not change the
   era-adjusted wins leaderboard.`},
  {date:'2026-07-05', tag:'Fixed', title:'Crimsix 2020 Grand Finals MVP honor',
   body:`Crimsix's 2020 Call of Duty League Championship <strong>Grand Finals MVP</strong> now appears in his player
   honors. The source award row uses his alternate wiki handle <strong>C6</strong>, which is now normalized to Crimsix
   during the data build. Rankings and era-adjusted totals are unchanged.`},
  {date:'2026-07-04', tag:'Improved', title:'Similar players now include skill-rate shape',
   body:`Similar players and the similarity map now include on-record <strong>K/D</strong>, <strong>Respawn K/D</strong>,
   <strong>S&amp;D K/D</strong>, and <strong>interactions per map</strong> as a labeled Skill component. Sparse stat
   splits are ignored rather than treated as zero, and raw kills/deaths/interactions/maps remain sample context
   instead of score inputs.`},
  {date:'2026-07-04', tag:'Improved', title:'Cleaner player stats coverage',
   body:`Player profiles now keep the event/map source-coverage count in the compact pill and remove duplicate
   Events, Maps, Overall, and Interactions cards from the Stats on record section. Season drilldowns start closed,
   show only the selected split in each summary, and keep the full mode breakdown inside the opened detail.`},
  {date:'2026-07-04', tag:'Improved', title:'Conversion and deep-run context',
   body:`Player profiles and the compare page now show <strong>Win conversion</strong>, <strong>Finals rate</strong>,
   and <strong>Deep-run rate</strong> from the normalized major-entry list. Win conversion is also available as an
   optional leaderboard column and recomputes with the Eras/title filter. These are context stats only; they do not
   change the era-adjusted rankings.`},
  {date:'2026-07-04', tag:'Improved', title:'Compare includes formal honors',
   body:`The player compare summary now includes an <strong>Honors</strong> row, showing each player's count of sourced
   formal award rows with a compact breakdown of award types. Like the player-page Honors section, this is profile
   context only and does not change era-adjusted rankings.`},
  {date:'2026-07-04', tag:'Improved', title:'Section links for methodology, player, and season pages',
   body:`Long reference pages now include compact <strong>On this page</strong> links and stable section anchors, so
   methodology explanations, player-page sections like Honors and Similar players, and season event/player lists can be
   linked directly. Deep links account for the sticky header, so shared URLs scroll the intended section into view.`},
  {date:'2026-07-04', tag:'Improved', title:'Clearer methodology and player-page adjusted-wins copy',
   body:`The old weighting-only framing is now labeled as <strong>Methodology</strong> in the nav and introduces the full
   page scope: adjusted wins, tournament/source rules, tracker differences, and optional ring weighting. Player pages now
   group the season-share table and opportunity chart under a broader adjusted-wins explainer so the per-player math has
   context before the details.`},
  {date:'2026-07-04', tag:'New', title:'Player honors',
   body:`Player pages now include an <strong>Honors</strong> section sourced from the CoD Esports Wiki awards table:
   Champs/Event MVPs, Season MVP, Rookie of the Year, CDL First/Second Team, and CWL All-Star selections. The section is
   source-linked, kept separate from the era-adjusted wins metric, and presented as profile context rather than a GOAT score input.
   The copy notes that early-era award coverage is incomplete and non-standardized, so missing honors do not imply a true zero.`},
  {date:'2026-07-04', tag:'New', title:'Curated player roles',
   body:`Player pages, the compare page, and an optional leaderboard column now show curated primary roles
   (<strong>AR</strong>, <strong>Flex</strong>, or <strong>SMG</strong>) by season. The labels were added manually,
   with older VOD research used for players whose historical roles were less obvious. Role data is also a small input
   to Similar players, comparing only overlapping seasons with known roles so unknown seasons are not guessed.
   Every player-season role row includes a dispute link that opens a GitHub issue form requiring evidence.`},
  {date:'2026-07-04', tag:'Fixed', title:'Expanded leaderboard columns fit on desktop',
   body:`The leaderboard now keeps the ring-weighted, Events placed, and Average placement columns visible on desktop
   without hiding right-side headers behind a bottom-only horizontal scroll. Header labels can wrap cleanly, and numeric
   columns use tighter minimum widths while the default view still fills the available table width.`},
  {date:'2026-07-04', tag:'Improved', title:'Compare tables are easier to scan',
   body:`The player compare page now adds compact visual bars to each summary row and heatmap tinting to the
   season-by-season matrix. The exact numbers still lead, but two-to-four-player comparisons now make leaders,
   gaps, missing seasons, and Champs-winning seasons easier to read at a glance.`},
  {date:'2026-07-04', tag:'Improved', title:'Player pages show event rosters',
   body:`The player page's <strong>All entered</strong> view now lists the roster/team for each major finish.
   When the CoD Esports Wiki has a standard team-logo file available, the row shows that logo beside the roster name;
   otherwise it falls back to text so historical teams still stay readable. The same team labels now appear in the wins
   view, profile header, compare season matrix, and season event winners.`},
  {date:'2026-07-04', tag:'New', title:'Average placement and events placed columns',
   body:`The leaderboard now includes <strong>Events placed</strong> and <strong>Average placement</strong>. Both stats
   recompute with the Eras/title filter, so a CDL-only view uses only CDL major finishes. Average placement is calculated
   from the same normalized event list shown on each player page: team finish per major entered, tied placement ranges
   scored by midpoint, and the same Warzone/Mobile and non-major exclusions as the wins metric.`},
  {date:'2026-07-04', tag:'New', title:'Player compare',
   body:`A new <a href="compare.html?p=Shotzzy&p=HyDra">Compare</a> page puts two to four players side by side:
   adjusted wins, championships, peak, title count, career span, events, average placement, and the season-by-season
   wins per major entered that explain close debates like Shotzzy vs HyDra. It also suggests similar players to add
   to the comparison, includes a Rows picker for optional stats like raw wins and Post-BO2 adjusted wins, and keeps the
   selected players and rows in the URL so comparisons are shareable. The leaderboard now has a Compare mode for selecting
   two to four players, and player/similar-player pages can seed a comparison directly.`},
  {date:'2026-07-03', tag:'Fixed', title:'Similar players and Signatures use consistent career spans',
   body:`The <a href="player.html?p=Crimsix">Similar players</a> comparison now uses the same participation-based
   career span as the map and Signatures pages: first major entered through last major entered, not first win through
   last win. Its percentile tags also treat identical values as identical, so two players with the same displayed stat
   no longer split into different buckets by list order. The <a href="signatures.html">Signatures</a> boards now keep
   their intended sizes while still extending through ties at the displayed cut value.`},
  {date:'2026-07-03', tag:'Fixed', title:'Insights audit: consistent careers, honest scales',
   body:`A sweep of every Insights page. The <a href="map.html">similarity map</a> had its vertical axis flipped
   against its own annotations by a data rebuild; the build now pins the orientation so "long, well-traveled careers"
   always point down. The map's debut and span figures now use the same participation-based career (first major
   <em>entered</em>, years competing) as the rest of the site, instead of first-win-to-last-win. Signature boards no
   longer cut ties arbitrarily: a player tied with the last spot now always shows (or neither does). The
   <a href="heatmap.html">heatmap</a> legend states its scale (color runs to the highest share shown, not 100%), the
   <a href="scatter.html">scatter</a> explains split-format season denominators like MW19's "4 of 9 winnable (13 held)"
   and sizes bubbles by area, and "the most dominant season the model can score" is now honestly "on record".`},
  {date:'2026-07-03', tag:'Methodology', title:'Black Ops 7 major count corrected to 6',
   body:`The wiki's Majors portal listed the <strong>Call of Duty Challengers Finals 2026</strong>, an amateur
   Challengers event, as a Black Ops 7 major, so the season's schedule read as 7 majors instead of 6 (4 CDL Majors,
   Champs, and the EWC). That extra event was dividing every BO7 win by 7 instead of 6, under-weighting this season's
   winners. It's now excluded, so BO7 winners tick up: <strong>HyDra #14→#12</strong>, with Drazah, Dashy and Scrap each
   up one and the low-win names gaining most (Sib #58→#54). The average majors/season the scale rests on eased from 8.61
   to 8.56. <a href="methodology.html#tournaments">Which tournaments count →</a>`},
  {date:'2026-07-03', tag:'Improved', title:'Expanded methodology: which tournaments count',
   body:`The methodology page now has a dedicated <a href="methodology.html#tournaments">"Which tournaments count"</a>
   section: why the site defers to the CoD Esports Wiki's Major Wins list instead of adjudicating tournaments itself,
   and why Scump shows <strong>28</strong> here versus 30 elsewhere. The short version: the Major Wins list is generated
   from the wiki's database, while the "Winningest Players" pages are hand-typed and use looser rules, so they disagree.
   Think an event is wrongly in or out? That's a case for the wiki editors, and it flows through here automatically.`},
  {date:'2026-07-03', tag:'New', title:'Shareable ranking cards',
   body:`Every view is now shareable as a social card. Hit <strong>Share ranking</strong> and the link's preview renders
   <em>your</em> exact top 5 with your settings. So posting "CDL era, rings ×3 → Shotzzy #1" shows the ranking, not a
   generic thumbnail. Built as an on-the-fly image from the same engine that powers the board, so the card always matches
   the live numbers.`},
  {date:'2026-07-02', tag:'New', title:'Optional championship weighting',
   body:`A <strong>Ring weight</strong> slider lets you weight CoD World Championships more heavily for the
   rings-matter camp: set a ring worth up to <strong>6</strong> regular majors and the board re-ranks by an
   <strong>"Adj +◆"</strong> total (adjusted wins plus the extra ring value). At ×4, for example, <strong>Karma jumps to
   #2</strong> and Clayster into the top 6 on the strength of three championships each. It's off by default and never
   changes the neutral era-adjusted number. An optional overlay, not a new metric. <a href="methodology.html">Methodology →</a>`},
  {date:'2026-07-02', tag:'New', title:'Filter the leaderboard by era',
   body:`A new <strong>Eras</strong> control lets you re-rank on any slice of Call of Duty history: presets for the
   <strong>CDL era</strong>, the <strong>MLG–CWL era (BO2–BO4)</strong>, Post-BO2 or Pre-BO2, plus per-title checkboxes
   for a custom set. The numbers fully <em>recompute</em> for the seasons you pick (adjusted wins, ranks, peak, longevity)
   rather than just hiding rows, so a CDL-era view is led by <strong>aBeZy and Simp</strong>, not the all-time win
   compilers. The old "Exclude pre-BO2" toggle is now simply the "Post-BO2" preset, and your selection is saved in the
   URL so you can share an exact era view. <a href="methodology.html#era-adjustment">How adjusted wins work →</a>`},
  {date:'2026-07-02', tag:'New', title:'Show or hide columns',
   body:`A <strong>Columns</strong> menu lets you hide any columns you don't need; the table resizes to fit what's left.
   Your choice is remembered and shareable via the URL.`},
  {date:'2026-07-02', tag:'Changed', title:'Documented the Scump major-count discrepancy',
   body:`Some trackers list Scump at 30 major wins vs <strong>28</strong> here. The methodology page and Scump's player
   page now explain why: we follow the CoD Esports Wiki's Major/Premier classification, while sources like breakingpoint
   count a few sub-major or legacy events, and the exact events vary by source, so we defer to the wiki rather than
   hand-pick tournaments. <a href="methodology.html#tournaments">Data sources →</a>`},
  {date:'2026-07-02', tag:'New', title:'Leaderboard expanded to every player with 2+ major wins',
   body:`The board now covers all <strong>91</strong> players with at least two console major wins, up from the top 50.
   Every added player is verified against the wiki's published totals the same way, and gets the full treatment:
   player page, season pages, and a dot on the Peak vs Longevity chart. Era adjustment matters here too: several

const TAGCLASS = {Methodology:'warn', New:'tag', Improved:'flat', Changed:'flat', Fixed:'flat'};

let html = `<h1>Changelog</h1>
  <p class="lede">What's changed on the site. <strong>Methodology</strong> entries (amber) are changes that move the
  rankings. They're logged with their reasoning and impact, so the numbers are never a black box.</p>`;

let lastDate = null;
for(const e of ENTRIES){
  if(e.date !== lastDate){ html += `<div class="cl-date">${e.date}</div>`; lastDate = e.date; }
  html += `<div class="cl-entry">
    <div class="cl-tag"><span class="pill ${TAGCLASS[e.tag]||'flat'}">${e.tag}</span></div>
