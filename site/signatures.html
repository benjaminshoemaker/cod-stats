<meta property="og:title" content="Signatures · CoD majors">
<meta property="og:description" content="The ratios hiding behind the leaderboard: rings per win, wins per year, when in a career the titles landed. Live from the data.">

<script defer src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js"

<style>
  .sig{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:var(--space-4) var(--space-5) var(--space-4);margin:var(--space-4) 0}
  .sig-top{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-4)}
  .sig h2{font-size:var(--text-lg);margin:0 0 var(--space-1);letter-spacing:-.01em}
  .sig .unit{font-family:var(--mono);font-size:var(--text-xs);letter-spacing:.05em;text-transform:uppercase;
    color:var(--faint);white-space:nowrap}
  .sig .concept{color:var(--muted);font-size:var(--text-base);margin:var(--space-1) 0 var(--space-1);max-width:74ch}
  .sig .howto{color:var(--faint);font-size:var(--text-sm);margin:var(--space-1) 0 var(--space-3);max-width:74ch}
  .sig-pair{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4) var(--space-6)}
  @media(max-width:640px){.sig-pair{grid-template-columns:1fr;gap:var(--space-2)}}
  .sub-h{font-size:var(--text-xs);font-weight:700;color:var(--ink);margin:var(--space-1) 0 var(--space-1)}
  .sub-h .q{color:var(--faint);font-weight:500}
  .sigrow{display:grid;grid-template-columns:1.2rem minmax(56px,auto) 1fr auto;align-items:center;
    gap:var(--space-2);padding:var(--space-1) 0;border-top:1px solid var(--line)}
  .sigrow:first-of-type{border-top:0}
  .sigrk{color:var(--faint);font-size:var(--text-xs);text-align:right;font-variant-numeric:tabular-nums}
  .signm{font-weight:600;font-size:var(--text-base);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:var(--ink)}
  .signm:hover{color:var(--accent);text-decoration:none}
  .sigbar{background:var(--panel-2);border-radius:5px;height:7px;overflow:hidden}
  .sigfill{display:block;height:100%;background:var(--accent);border-radius:5px}
  .sigfill.alt{background:var(--warn)}
  .sigval{font-size:var(--text-sm);color:var(--ink);white-space:nowrap;text-align:right;
    font-variant-numeric:tabular-nums;font-family:var(--mono)}
  .sigsub{color:var(--faint)}
  .ceil{display:flex;gap:var(--space-6);flex-wrap:wrap;align-items:center;background:var(--accent-soft);
    border:1px solid var(--line);border-radius:var(--radius);padding:var(--space-4) var(--space-5);margin:var(--space-2) 0 var(--space-1)}
  .ceil .big{font-size:var(--text-hero);font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;
    line-height:1;font-family:var(--mono)}
  .ceil .grps{display:flex;flex-direction:column;gap:var(--space-1);font-size:var(--text-base)}
  .ceil .season{font-weight:600;color:var(--ink)}
  .ceil .who{color:var(--muted)}
</style>
</head>
<body>
<script src="assets/nav.js"></script>
<main class="wrap" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script>
mountNav('signatures.html');
const root=document.getElementById('root');
const LB=D.leaderboard, P=D.players;

// ---- helpers -------------------------------------------------------------
function winDates(name){
  const p=P[name]; if(!p) return [];
  return p.seasons.flatMap(s=>s.events.map(e=>e.date)).sort();
}
// Place each WIN on the line from a player's first major PLAYED to their last
// (the whole career, entered or won) — not first-win to last-win, which hid late
// bloomers who competed for years before breaking through.
function frontload(r){
  const wins=winDates(r.name); if(wins.length<4) return null;
  if(!r.firstPlayedDate||!r.lastPlayedDate) return null;
  const t=s=>new Date(s+'T00:00:00').getTime();
  const c0=t(r.firstPlayedDate), span=t(r.lastPlayedDate)-c0; if(span<=0) return null;
  const clamp=x=>Math.max(0,Math.min(1,x));
  return {v: wins.reduce((a,d)=>a+clamp((t(d)-c0)/span),0)/wins.length, n: wins.length};
}
// render a ranked list: rows = [{name, bar, val, sub, alt}]
function bars(rows){
  const mx=Math.max(...rows.map(r=>r.bar))||1;
  return rows.map((r,i)=>`<div class="sigrow">
    <span class="sigrk">${i+1}</span>
    <a class="signm" href="player.html?p=${encodeURIComponent(r.name)}">${esc(r.name)}</a>
    <span class="sigbar"><span class="sigfill${r.alt?' alt':''}" style="width:${Math.max(4,r.bar/mx*100).toFixed(0)}%"></span></span>
    <span class="sigval">${r.val}${r.sub?` <span class="sigsub">${r.sub}</span>`:''}</span>
  </div>`).join('');
}
const TOP=6;
// Top N of a sorted list, extended through any tie at the cut, so source-data
// order can never decide who makes a board (e.g. two 11-year careers both show
// or both don't).
function cut(rows, key, n=TOP){
  const out=rows.slice(0,n);
  for(let i=n;i<rows.length && key(rows[i])===key(out[out.length-1]);i++) out.push(rows[i]);
  return out;
}

// ---- 1. Ring merchants & the uncrowned ----------------------------------
const merchants=cut(LB.filter(r=>r.champs>=2)
  .map(r=>({name:r.name, rate:r.champs/r.adjAll, champs:r.champs, adj:r.adjAll}))
  .sort((a,b)=>b.rate-a.rate), r=>r.rate)
  .map(r=>({name:r.name, bar:r.rate, val:r.rate.toFixed(2),
            sub:`${r.champs} rings / ${r.adj.toFixed(1)} adj`}));
const uncrowned=cut(LB.filter(r=>r.champs===0)
  .sort((a,b)=>b.adjAll-a.adjAll), r=>r.adjAll)
  .map(r=>({name:r.name, bar:r.adjAll, val:r.adjAll.toFixed(1), sub:`${r.raw} raw`, alt:true}));

// ---- 2. Compressed dominance --------------------------------------------
// Denominator is the CAREER span (first major entered to last, won or not) from
// participation data — not the first-win-to-last-win span, which understates how
// long players actually competed and over-rated short winning windows.
const density=cut(LB.filter(r=>r.adjAll>=4 && r.careerSpan>=2)
  .map(r=>({name:r.name, rate:r.adjAll/r.careerSpan, adj:r.adjAll, y:r.careerSpan}))
  .sort((a,b)=>b.rate-a.rate), r=>r.rate)
  .map(r=>({name:r.name, bar:r.rate, val:r.rate.toFixed(2), sub:`${r.adj.toFixed(1)} adj / ${r.y}y`}));

// ---- 3. Prodigies & late bloomers ---------------------------------------
const fl=LB.map(r=>{const f=frontload(r); return f?{name:r.name, v:f.v, n:f.n,
    range:`${r.firstPlayed}–${r.lastPlayed}`}:null;}).filter(Boolean);
const prodigies=cut([...fl].sort((a,b)=>a.v-b.v), r=>r.v)
  .map(r=>({name:r.name, bar:0.5-r.v, val:r.v.toFixed(2), sub:r.range}));
const bloomers=cut([...fl].sort((a,b)=>b.v-a.v), r=>r.v)
  .map(r=>({name:r.name, bar:r.v-0.5, val:r.v.toFixed(2), sub:r.range, alt:true}));

// ---- 4. The long careers -------------------------------------------------
// Career length = first major entered to last, from participation (won or not).
const careers=cut([...LB].sort((a,b)=>b.careerSpan-a.careerSpan), r=>r.careerSpan)
  .map(r=>({name:r.name, bar:r.careerSpan, val:`${r.careerSpan}y`,
            sub:`${r.firstPlayed}–${r.lastPlayed}`}));

// ---- 5. The single-season ceiling ---------------------------------------
const peakMax=Math.max(...LB.map(r=>r.peakAll));
const tied=LB.filter(r=>Math.abs(r.peakAll-peakMax)<1e-6);
const bySeason={};
tied.forEach(r=>{const s=r.peakInfoAll.season;
  (bySeason[s]=bySeason[s]||{info:r.peakInfoAll, names:[]}).names.push(r.name);});
const ceilGroups=Object.entries(bySeason).map(([s,g])=>
  `<div><span class="season">${esc(s)}</span> · ${g.info.wins} of ${g.info.majors} majors<br>
   <span class="who">${g.names.map(n=>`<a class="signm" href="player.html?p=${encodeURIComponent(n)}">${esc(n)}</a>`).join(', ')}</span></div>`
).join('');

// ---- render --------------------------------------------------------------
root.innerHTML=`
  <h1>Signatures</h1>
  <p class="lede">The leaderboard ranks players by era-adjusted major wins. These are the <strong>ratios between</strong>
  the numbers: rings to wins, wins to years, when in a career the titles landed. Every board below recomputes
  live from the current data.</p>

  <div class="sig">
    <div class="sig-top"><h2>Ring merchants &amp; the uncrowned</h2><span class="unit">rings ÷ adj · adj wins</span></div>
    <p class="concept">The World Championship is one per year and unweighted, the biggest single title in CoD.
    This ranks a player's rings as a share of their era-adjusted wins: how much of a career is crowns.</p>
    <p class="howto">Left needs 2 or more rings, so a one-time champion can't top the ratio. Right is the most
    era-adjusted wins with no Championship at all.</p>
    <div class="sig-pair">
      <div><div class="sub-h">Most crown-heavy <span class="q">· rings ÷ adj wins</span></div>${bars(merchants)}</div>
      <div><div class="sub-h">The uncrowned <span class="q">· adj wins, zero rings</span></div>${bars(uncrowned)}</div>
    </div>
  </div>

  <div class="sig">
    <div class="sig-top"><h2>Compressed dominance</h2><span class="unit">adj wins ÷ year</span></div>
    <p class="concept">Era-adjusted wins divided by years competing: the first major a player entered to their last,
    won or not. Higher means more winning packed into the years they were around.</p>
    <p class="howto">Career span counts every major entered, not just the ones won, so a player who kept competing after
    their last title isn't credited with a shorter, denser career. Minimum 4 adjusted wins and a two-year span.</p>
    ${bars(density)}
  </div>

  <div class="sig">
    <div class="sig-top"><h2>Prodigies &amp; late bloomers</h2><span class="unit">career-timing index</span></div>
    <p class="concept">Place every win on a 0-to-1 line spanning a player's whole career, from the first major they
    entered to their last, then average. Below 0.5 the wins came early in the career; above 0.5 they came late.</p>
    <p class="howto">The line is the full career, entered or won, so a player who competed for years before breaking
    through reads as a late bloomer. Minimum 4 wins; it measures when titles landed, not how many.</p>
    <div class="sig-pair">
      <div><div class="sub-h">Prodigies <span class="q">· won early, then tapered</span></div>${bars(prodigies)}</div>
      <div><div class="sub-h">Late bloomers <span class="q">· aged into winning</span></div>${bars(bloomers)}</div>
    </div>
  </div>

  <div class="sig">
    <div class="sig-top"><h2>The long careers</h2><span class="unit">years, first → last major</span></div>
    <p class="concept">Years between a player's first major and their most recent one, counting every event they
    entered, won or not.</p>
    <p class="howto">Longevity in a sport barely fifteen years old. This is time spent competing, not just the
    span of their wins, and players still active keep adding to it.</p>
    ${bars(careers)}
  </div>

  <div class="sig">
    <div class="sig-top"><h2>The most dominant season on record</h2><span class="unit">era-adjusted peak</span></div>
    <p class="concept">A season's era-adjusted value is (wins ÷ majors that season) × the average majors per season.
    This is the best any player has scored.</p>
    <p class="howto">A record, not a cap: a lean-major season makes each win worth the most, so the same peak is
    reachable in any era, not just recent ones, and a bigger sweep would beat it.</p>
    <div class="ceil">
      <div class="big">${peakMax.toFixed(2)}</div>
      <div class="grps">${ceilGroups}</div>
    </div>
  </div>
`;
mountFoot();
</script>
</body>
</html>
