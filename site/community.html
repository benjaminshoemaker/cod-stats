<script type="module">
import { titlePoint } from './assets/goat.js';
mountPageNav('community.html');

const gameSel = document.getElementById('cc-game');
const titleField = document.getElementById('cc-title-field');
const eraField = document.getElementById('cc-era-field');
const host = document.getElementById('cc-root');
const shareBtn = document.getElementById('cc-share');
let CC = null;
let sourceById = {};
let ballotsBySource = {};
let currentEraSelection = new Set();
let CONSENSUS_GAMES = [];
let ERA_HELPERS = null;
let overallTable = null;

const OVERALL_LABEL = 'Overall Ranking';

const sourceLabel = s => String(s || '').replaceAll('_', ' ');
const fmtInt = n => Number(n || 0).toLocaleString('en-US');
const fmtPct1 = n => `${(Number(n || 0) * 100).toFixed(1)}%`;
const STATUS_TITLES = {
  scored: 'Scored: counted toward the consensus ranking',
  reviewed_not_scored: 'Reviewed, not scored: relevant, but no cleanly extractable ranked list',
  excluded: 'Excluded: out of scope for community consensus (media, official, or stat lists)',
};
const sourceStatusPill = status => {
  const t = esc(STATUS_TITLES[status] || STATUS_TITLES.excluded);
  if(status === 'scored') return `<span class="pill up" title="${t}">scored</span>`;
  if(status === 'reviewed_not_scored') return `<span class="pill warn" title="${t}">reviewed not scored</span>`;
  return `<span class="pill flat" title="${t}">excluded</span>`;
};
const CONF_TITLES = {
  high: 'High confidence: backed by an aggregate community survey or 5+ scored sources',
  medium: 'Medium confidence: 3–4 scored sources',
  low: 'Low confidence: only 1–2 scored sources — treat the order as provisional',
};
const confidencePill = conf => {
  const t = esc(CONF_TITLES[conf] || CONF_TITLES.low);
  if(conf === 'high') return `<span class="pill up" title="${t}">high</span>`;
  if(conf === 'medium') return `<span class="pill flat" title="${t}">medium</span>`;
  return `<span class="pill warn" title="${t}">low</span>`;
};
const statusEl = document.getElementById('cc-status');
const announce = msg => { if(statusEl) statusEl.textContent = msg; };
async function copyText(text){
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch(e) {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    ta.remove();
    return ok;
  } catch(e) {
    return false;
  }
}
const playerCell = name => canonicalPlayerName(name) ? playerLink(name) : esc(name);
const selectedUrl = (game, player) => {
  const url = new URL(location.href);
  url.searchParams.set('view', 'title');
  url.searchParams.set('g', game);
  url.searchParams.set('p', player);
  url.searchParams.delete('mode');
  return url.pathname + '?' + url.searchParams.toString();
};
const overallUrl = player => {
  const url = new URL(location.href);
  url.searchParams.set('view', 'overall');
  if(player) url.searchParams.set('p', player);
  const token = selectionToken(currentEraSelection);
  if(token !== 'all') url.searchParams.set('eras', token);
  else url.searchParams.delete('eras');
  url.searchParams.delete('mode');
  url.searchParams.delete('g');
  return url.pathname + '?' + url.searchParams.toString();
};
const sourceUrl = src => src && src.url
  ? `<a href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.title || src.source_id)}</a>`
  : esc(src ? src.title || src.source_id : 'Unknown source');

function titleOrder(games){
  const order = new Map(D.meta.seasonOrder.map((g, i) => [g, i]));
  return games.slice().sort((a, b) => (order.get(a) ?? 999) - (order.get(b) ?? 999) || a.localeCompare(b));
}
function slugOf(game){
  return String(game || '').toLowerCase().replace(/[^a-z0-9]+/g, '').trim();
}
function buildEraHelpers(games){
  const order = titleOrder(games);
  const pre = new Set(D.meta.preBo2 || []);
  const cdlStart = D.meta.seasonOrder.indexOf('Modern Warfare');
  const eraOf = game => pre.has(game) ? 'prebo2' : (D.meta.seasonOrder.indexOf(game) >= cdlStart ? 'cdl' : 'mlgcwl');
  const presets = {
    all: order,
    post: order.filter(g => !pre.has(g)),
    prebo2: order.filter(g => eraOf(g) === 'prebo2'),
    mlgcwl: order.filter(g => eraOf(g) === 'mlgcwl'),
    cdl: order.filter(g => eraOf(g) === 'cdl'),
  };
  const bySlug = Object.fromEntries(order.map(g => [slugOf(g), g]));
  return {order, eraOf, presets, bySlug};
}
function setsEqual(a, b){
  if(a.size !== b.size) return false;
  for(const item of a) if(!b.has(item)) return false;
  return true;
}
function selectionToken(sel){
  if(!ERA_HELPERS || !sel || sel.size === 0) return 'all';
  for(const [key, titles] of Object.entries(ERA_HELPERS.presets)){
    if(setsEqual(sel, new Set(titles))) return key;
  }
  return 't:' + ERA_HELPERS.order.filter(g => sel.has(g)).map(slugOf).join('-');
}
function parseEraSelection(token){
  if(!ERA_HELPERS) return new Set();
  if(!token) return new Set(ERA_HELPERS.presets.all);
  if(ERA_HELPERS.presets[token]) return new Set(ERA_HELPERS.presets[token]);
  if(token.startsWith('t:')){
    const titles = token.slice(2).split('-').map(slug => ERA_HELPERS.bySlug[slug]).filter(Boolean);
    return new Set(titles.length ? titles : ERA_HELPERS.presets.all);
  }
  return new Set(ERA_HELPERS.presets.all);
}
function readState(){
  const params = new URLSearchParams(location.search);
  const games = titleOrder(Object.keys(CC.consensus.games || {}));
  const requestedView = params.get('view');
  const view = requestedView === 'overall' || requestedView === 'title'
    ? requestedView
    : (params.has('g') ? 'title' : 'overall');
  const game = games.includes(params.get('g')) ? params.get('g') : (games.includes('Black Ops 2') ? 'Black Ops 2' : games[0]);
  const rows = CC.consensus.games[game] || [];
  const selected = matchingConsensusRow(rows, params.get('p'));
  const player = selected ? selected.player : null;
  return {view, game, player, overallPlayer: params.get('p'), eras: parseEraSelection(params.get('eras'))};
}
function defaultConsensusGame(){
  return CONSENSUS_GAMES.includes('Black Ops 2') ? 'Black Ops 2' : CONSENSUS_GAMES[0];
}
function setTitleUrl(game, player, explicit){
  const url = new URL(location.href);
  url.searchParams.set('view', 'title');
  if(game === defaultConsensusGame()) url.searchParams.delete('g');
  else url.searchParams.set('g', game);
  const defaultPlayer = (CC.consensus.games[game] || []).filter(r => r.ranked)[0]?.player;
  if(player && (explicit || player !== defaultPlayer)) url.searchParams.set('p', player);
  else url.searchParams.delete('p');
  url.searchParams.delete('mode');
  url.searchParams.delete('eras');
  history.replaceState(null, '', url);
}
function setOverallUrl(player, explicit){
  const url = new URL(location.href);
  url.searchParams.delete('view');
  url.searchParams.delete('mode');
  const selectedGames = new Set([...currentEraSelection].filter(g => CONSENSUS_GAMES.includes(g)));
  const defaultPlayer = overallRows(selectedGames)[0]?.player;
  if(player && (explicit || player !== defaultPlayer)) url.searchParams.set('p', player);
  else url.searchParams.delete('p');
  const token = selectionToken(currentEraSelection);
  if(token !== 'all') url.searchParams.set('eras', token);
  else url.searchParams.delete('eras');
  url.searchParams.delete('g');
  history.replaceState(null, '', url);
}
function setActiveView(view){
  document.querySelectorAll('[data-cc-view]').forEach(btn => {
    const active = btn.dataset.ccView === view;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  eraField.hidden = view !== 'overall';
  titleField.hidden = view !== 'title';
}
function mountCommunityEraMenu(initial, onChange){
  const container = document.getElementById('cc-eramenu');
  container.innerHTML = '';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'colmenu-btn';
  btn.setAttribute('aria-haspopup', 'true');
  btn.setAttribute('aria-expanded', 'false');
  const panel = document.createElement('div');
  panel.className = 'colmenu-panel eramenu-panel';
  panel.hidden = true;
  const eras = [
    {key: 'prebo2', label: 'Pre-BO2 (open era)'},
    {key: 'mlgcwl', label: 'MLG-CWL era'},
    {key: 'cdl', label: 'CDL era'},
  ];
  const presetBtns = [['post', 'Post-BO2'], ['prebo2', 'Pre-BO2'], ['mlgcwl', 'MLG-CWL'], ['cdl', 'CDL']];
  const groups = eras.map(er => {
    const items = ERA_HELPERS.order.filter(g => ERA_HELPERS.eraOf(g) === er.key).map(g =>
      `<label class="colmenu-item"><input type="checkbox" data-title="${ERA_HELPERS.order.indexOf(g)}"> ${esc(g)}</label>`
    ).join('');
    return `<div class="era-group"><div class="era-group-h">${esc(er.label)}</div>${items || '<div class="small muted" style="padding:var(--space-1) var(--space-2)">No scored titles</div>'}</div>`;
  }).join('');
  panel.innerHTML = `<div class="era-presets">${presetBtns.map(([k, label]) =>
      `<button type="button" class="era-preset" data-preset="${k}">${esc(label)}</button>`).join('')}`
    + `<button type="button" class="era-preset era-clear" data-preset="all">Reset</button></div>`
    + `<div class="era-groups">${groups}</div>`;
  container.append(btn, panel);
  const boxes = () => Array.from(panel.querySelectorAll('input[data-title]'));
  const currentSet = () => {
    const sel = new Set();
    boxes().forEach(box => { if(box.checked) sel.add(ERA_HELPERS.order[Number(box.dataset.title)]); });
    return sel;
  };
  const syncChecks = sel => boxes().forEach(box => { box.checked = sel.has(ERA_HELPERS.order[Number(box.dataset.title)]); });
  const labels = {all: 'All', post: 'Post-BO2', prebo2: 'Pre-BO2', mlgcwl: 'MLG-CWL', cdl: 'CDL'};
  const updateLabel = sel => {
    const token = selectionToken(sel);
    const label = labels[token] || `${sel.size} titles`;
    btn.innerHTML = `Eras: ${esc(label)} <span aria-hidden="true">▾</span>`;
  };
  syncChecks(initial);
  updateLabel(initial);
  const close = refocus => {
    if(panel.hidden) return;
    panel.hidden = true;
    btn.setAttribute('aria-expanded', 'false');
    if(refocus) btn.focus();
  };
  const open = () => {
    panel.hidden = false;
    btn.setAttribute('aria-expanded', 'true');
  };
  btn.addEventListener('click', e => {
    e.stopPropagation();
    panel.hidden ? open() : close(false);
  });
  panel.addEventListener('click', e => {
    e.stopPropagation();
    const preset = e.target.dataset && e.target.dataset.preset;
    if(!preset) return;
    const sel = new Set(ERA_HELPERS.presets[preset]);
    syncChecks(sel);
    updateLabel(sel);
    onChange(sel);
    close(false);
  });
  panel.addEventListener('change', e => {
    if(!e.target.dataset.title) return;
    let sel = currentSet();
    if(sel.size === 0){
      e.target.checked = true;
      sel = currentSet();
    }
    updateLabel(sel);
    onChange(sel);
  });
  document.addEventListener('click', () => close(false));
  document.addEventListener('keydown', e => { if(e.key === 'Escape') close(true); });
}
function lookupPlayerKeyed(obj, player){
  if(!obj || !player) return undefined;
  if(Object.prototype.hasOwnProperty.call(obj, player)) return obj[player];
  const playerKey = playerLookupKey(player);
  const match = Object.keys(obj).find(k => playerLookupKey(k) === playerKey);
  return match ? obj[match] : undefined;
}
function matchingConsensusRow(rows, player){
  if(!rows || !player) return null;
  const playerKey = playerLookupKey(player);
  return rows.find(r => r.player === player) || rows.find(r => playerLookupKey(r.player) === playerKey) || null;
}
function rawWins(game, player){
  const byGame = CC.resumeWins && CC.resumeWins[game] || {};
  return lookupPlayerKeyed(byGame, player) ?? 0;
}
function winningEvents(game, player){
  const pl = playerRecord(player);
  const season = pl && (pl.seasons || []).find(s => s.game === game);
  if(season && season.events) return season.events.map(e => e.event).join(', ');
  const wins = rawWins(game, player);
  return wins ? `${wins} event${wins === 1 ? '' : 's'} in source data` : 'No major wins in source data';
}
function gameSources(game){
  return (CC.sources || []).filter(s => s.game === game).sort((a, b) => {
    const order = {scored: 0, reviewed_not_scored: 1, excluded: 2};
    return (order[a.status] ?? 9) - (order[b.status] ?? 9) || (a.published_year || 9999) - (b.published_year || 9999);
  });
}
function gameContributions(game, player){
  return Object.entries(CC.consensus.source_contributions || {})
    .map(([id, c]) => ({id, ...c, source: sourceById[id], contribution: lookupPlayerKeyed(c.scores, player) || 0}))
    .filter(c => c.game === game && c.contribution > 0)
    .sort((a, b) => b.contribution - a.contribution);
}
function sourceBallotCount(id){
  return ballotsBySource[id] ? ballotsBySource[id].length : 0;
}
function aggregatePlayerHit(src, player){
  const key = playerLookupKey(player);
  return src && Array.isArray(src.ranked_players)
    ? src.ranked_players.find(rp => playerLookupKey(rp.player) === key)
    : null;
}
function titleEvidenceColumn(game){
  const scored = gameSources(game).filter(s => s.status === 'scored');
  const aggregate = scored.length === 1 && scored[0].source_kind === 'community_aggregate_survey'
    ? scored[0]
    : null;
  if(!aggregate){
    return {
      title: 'Consensus strength',
      className: 'n score',
      headingText: 'Consensus strength is source-weighted; shown to 2 decimals (traces keep exact values). It is most meaningful when multiple scored sources can agree or disagree. Click a row or Trace for the evidence. Event wins are context only.',
      cell: r => Number(r.consensus_score).toFixed(2)
    };
  }
  return {
    title: 'Poll detail',
    className: 'source-detail',
    headingText: 'This title currently rests on one aggregate poll, so the table shows poll/source detail instead of treating adjacent rank-points as margin. Click a row or Trace for the scoring math. Event wins are context only.',
    cell: r => {
      const hit = aggregatePlayerHit(aggregate, r.player);
      const detail = aggregateDetailText(aggregate, hit);
      if(detail) return detail;
      return hit ? `Ranked #${hit.rank} of ${aggregate.ranking_size || aggregate.ranked_players.length}` : 'No poll detail';
    }
  };
}
function rankPoints(rank){
  // shared curve from goat.js; a missing rank counts as 31 (zero points)
  return titlePoint(Number(rank || 31)) ?? 0;
}
function gameAbbrev(game){
  const map = {
    'Black Ops': 'BO',
    'Black Ops 2': 'BO2',
    'Black Ops 3': 'BO3',
    'Black Ops 4': 'BO4',
    'Black Ops Cold War': 'BOCW',
    'Black Ops 6': 'BO6',
    'Black Ops 7': 'BO7',
    'Modern Warfare': 'MW',
    'Modern Warfare 3': 'MW3',
    'Modern Warfare II': 'MWII',
    'Modern Warfare III': 'MWIII',
    'Advanced Warfare': 'AW',
    'Infinite Warfare': 'IW',
    'World War II': 'WWII',
    'Vanguard': 'VG',
  };
  return map[game] || game;
}
function playerKeyForRollup(player){
  return playerLookupKey(canonicalPlayerName(player) || player);
}
function playedTitleSet(player, placements, selectedGames){
  const pl = playerRecord(player);
  const allowed = selectedGames || new Set(CONSENSUS_GAMES);
  const played = new Set((pl && pl.placements || []).map(p => p.game).filter(g => g && allowed.has(g)));
  if(played.size) return played;
  (pl && pl.seasons || []).forEach(s => s.game && allowed.has(s.game) && played.add(s.game));
  placements.forEach(p => p.game && allowed.has(p.game) && played.add(p.game));
  if(!played.size) placements.forEach(p => p.game && played.add(p.game));
  return played;
}
function playedTitleCount(player, placements, selectedGames){
  return playedTitleSet(player, placements, selectedGames).size || placements.length;
}
function totalEventWins(player, selectedGames){
  const pl = playerRecord(player);
  if(pl && selectedGames){
    return (pl.seasons || []).filter(s => selectedGames.has(s.game)).reduce((sum, s) => sum + Number(s.wins || 0), 0);
  }
  if(pl && Number.isFinite(pl.raw)) return pl.raw;
  const key = playerLookupKey(player);
  return Object.entries(CC.resumeWins || {}).reduce((sum, [game, byGame]) => {
    if(selectedGames && !selectedGames.has(game)) return sum;
    const match = Object.keys(byGame || {}).find(name => playerLookupKey(name) === key);
    return sum + (match ? Number(byGame[match] || 0) : 0);
  }, 0);
}
function buildOverallRows(selectedGames){
  const byPlayer = new Map();
  for(const [game, rows] of Object.entries(CC.consensus.games || {})){
    if(selectedGames && !selectedGames.has(game)) continue;
    rows.filter(r => r.ranked).forEach(r => {
      const canonical = canonicalPlayerName(r.player) || r.player;
      const key = playerKeyForRollup(canonical);
      if(!byPlayer.has(key)){
        byPlayer.set(key, {player: canonical, total: 0, placements: []});
      }
      const rec = byPlayer.get(key);
      const points = rankPoints(r.consensus_rank);
      rec.total += points;
      rec.placements.push({
        game,
        rank: r.consensus_rank,
        score: Number(r.consensus_score || 0),
        confidence: r.confidence,
        sourceCount: r.source_count,
        points,
        wins: rawWins(game, r.player),
      });
    });
  }
  const seasonOrder = new Map(D.meta.seasonOrder.map((g, i) => [g, i]));
  return [...byPlayer.values()].map(rec => {
    rec.placements.sort((a, b) => (seasonOrder.get(a.game) ?? 999) - (seasonOrder.get(b.game) ?? 999) || a.rank - b.rank);
    rec.rankedTitles = rec.placements.length;
    rec.playedTitles = playedTitleCount(rec.player, rec.placements, selectedGames);
    rec.perPlayed = rec.playedTitles ? rec.total / rec.playedTitles : 0;
    rec.perRanked = rec.rankedTitles ? rec.total / rec.rankedTitles : 0;
    rec.unrankedPlayedTitles = Math.max(0, rec.playedTitles - rec.rankedTitles);
    const rankedRankSum = rec.placements.reduce((sum, p) => sum + Number(p.rank || 0), 0);
    rec.averageRank = rec.playedTitles ? (rankedRankSum + rec.unrankedPlayedTitles * 31) / rec.playedTitles : null;
    rec.eventWins = totalEventWins(rec.player, selectedGames);
    rec.top1 = rec.placements.filter(p => p.rank === 1).length;
    rec.top3 = rec.placements.filter(p => p.rank <= 3).length;
    rec.top5 = rec.placements.filter(p => p.rank <= 5).length;
    rec.top10 = rec.placements.filter(p => p.rank <= 10).length;
    rec.highConfidence = rec.placements.filter(p => p.confidence === 'high').length;
    return rec;
  });
}
function overallRows(selectedGames){
  return buildOverallRows(selectedGames)
    .slice()
    .sort((a, b) => b.total - a.total || a.player.localeCompare(b.player))
    .map((r, i) => ({...r, rank: i + 1}));
}
function matchingOverallRow(rows, player){
  if(!player) return rows[0];
  const key = playerLookupKey(player);
  return rows.find(r => playerLookupKey(r.player) === key) || rows[0];
}
function titlePlacementChip(player, placement){
  const weak = placement.rank > 10 ? ' weak' : '';
  return `<a class="title-pill${weak}" href="${esc(selectedUrl(placement.game, player))}" data-title-link="${esc(placement.game)}" data-title-player="${esc(player)}">${esc(gameAbbrev(placement.game))} #${placement.rank}</a>`;
}
function renderOverallSummary(rows, selectedGames){
  return '';
}
function renderOverallTable(rows, selected){
  return `<section class="panel-shell">
    <div class="panel-head">
      <div><h2>${OVERALL_LABEL}</h2><p class="small muted">Who does the community rate highest across a whole career? Each title rank earns points; the points add up — so the overall score is a career total, and being ranked in more titles adds more. Average rank is the per-title view: sort by it to compare peaks instead. Top 1/3/5/10 count the titles where the community ranked the player that high. Recent titles often rest on one large poll, older titles on smaller preserved threads — click a player row or Trace to inspect the evidence behind their score.</p></div>
      <span class="pill tag">As of ${esc(D.meta.asOf)}</span>
    </div>
    <div class="panel-body">
      <p class="scrollhint small muted">Scroll the table sideways for event wins, top finishes, and trace links.</p>
      <div id="cc-overall-table" class="community-overall-table" role="region" aria-label="Overall community consensus table"></div>
    </div>
  </section>`;
}
function mountOverallTable(rows, selected){
  if(overallTable){
    try { overallTable.destroy(); } catch(e) {}
    overallTable = null;
  }
  const topMetric = rows[0]?.total || 1;
  const data = rows.map((r, i) => ({
    ...r,
    rank: i + 1,
    activeScore: r.total,
    activeWidth: Math.max(4, Math.round(r.total / topMetric * 100)),
    selected: selected && r.player === selected.player,
  }));
  const M = window.matchMedia('(max-width: 760px)').matches;
  overallTable = TableSurface.mountTabulator('#cc-overall-table', {
    label: 'Overall community consensus table',
    data,
    layout: 'fitColumns',
    placeholder: 'No players match this era selection.',
    columns: [
      {title:'Rank', field:'rank', width:M?58:64, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum'},
      {title:'Player', field:'player', minWidth:M?130:160, widthGrow:1.2, formatter:c=>`<strong>${playerCell(c.getValue())}</strong>`},
      {title:'Overall score', field:'activeScore', minWidth:M?112:136, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum score',
        headerTooltip:'Sum of rank points across titles. Shown to 2 decimals; the trace shows exact values.',
        formatter:c=>`${Number(c.getValue()).toFixed(2)}<span class="bar-mini"><span style="width:${c.getData().activeWidth}%"></span></span>`},
      {title:'Average rank', field:'averageRank', minWidth:116, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum',
        headerTooltip:'Average across played titles; played-but-unranked titles count as rank 31.',
        formatter:c=>c.getValue() == null ? '<span class="faint">-</span>' : Number(c.getValue()).toFixed(1)},
      {title:'Title count', field:'playedTitles', minWidth:96, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum',
        headerTooltip:'Played titles included in the average-rank denominator.'},
      {title:'Event wins', field:'eventWins', minWidth:108, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum context-band',
        headerTooltip:'Context only — event wins never affect the community score.'},
      {title:'Top 1', field:'top1', minWidth:72, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum',
        headerTooltip:'Titles where the community ranked this player #1.'},
      {title:'Top 3', field:'top3', minWidth:72, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum',
        headerTooltip:'Titles where the community ranked this player in the top 3.'},
      {title:'Top 5', field:'top5', minWidth:84, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum top-count',
        headerTooltip:'Titles where the community ranked this player in the top 5.'},
      {title:'Top 10', field:'top10', minWidth:82, hozAlign:'right', headerHozAlign:'right', cssClass:'tabnum',
        headerTooltip:'Titles where the community ranked this player in the top 10.'},
      {title:'Trace', field:'player', minWidth:86, formatter:c=>{
        const player = c.getValue();
        return `<a class="evidence-link" href="${esc(overallUrl(player))}" data-overall-player="${esc(player)}">Trace</a>`;
      }},
    ],
    rowFormatter:row => row.getElement().classList.toggle('community-selected-row', !!row.getData().selected),
  });
  overallTable.on('rowClick', (e, row) => {
    if(e.target.closest('a,button,input,label,select,textarea')) return;
    renderOverall(row.getData().player, {focusTrace: true});
  });
}
function renderOverallDetail(playerRow){
  const calcRows = playerRow.placements.map(p => `<div class="calc-row">
    <div class="calc-row-head"><span class="calc-title">${titlePlacementChip(playerRow.player, p)}</span><span class="contribution">${p.points.toFixed(3)}</span></div>
    <span class="sub">Rank #${p.rank} · ${p.wins} event win${p.wins === 1 ? '' : 's'}</span>
    <div class="calc-math">
      <span class="math-chip"><span class="k">Rank</span><span class="v">#${p.rank}</span></span>
      <span class="math-op">→</span>
      <span class="math-chip"><span class="k">Rank points</span><span class="v">${p.points.toFixed(3)}</span></span>
    </div>
  </div>`).join('') || '<p class="small muted">No ranked titles in this era selection.</p>';
  return `<aside class="panel-shell">
    <div class="panel-head">
      <div><h2>${esc(playerRow.player)} Overall Trace</h2><p class="small muted">Every title row links to the per-title trace where the source inputs are shown.</p></div>
      <span class="pill tag">Overall #${playerRow.rank}</span>
    </div>
    <div class="panel-body" id="cc-overall-trace-card" tabindex="-1">
      <a class="cc-backlink" href="#cc-overall-table" data-cc-back>← Back to ranking</a>
      <div class="mini-grid community-mini-grid">
        <div class="mini"><div class="k">Score</div><div class="v">${playerRow.total.toFixed(2)}</div></div>
        <div class="mini"><div class="k">Avg rank</div><div class="v">${playerRow.averageRank == null ? '-' : playerRow.averageRank.toFixed(1)}</div></div>
        <div class="mini"><div class="k">Titles</div><div class="v">${playerRow.rankedTitles}<span class="sub">ranked</span></div></div>
        <div class="mini"><div class="k">Wins</div><div class="v">${playerRow.eventWins}<span class="sub">not scored</span></div></div>
      </div>
      <p class="small muted">Overall points are the sum of title ranks converted with
        <a href="methodology.html#community-rank-points">the rank-points curve</a>:
        <span class="formula">((31 - rank) / 30) ** 2.5</span> — a deliberately top-heavy curve (rank 1 = 1.000, rank 30 ≈ 0),
        so elite finishes count far more than list tails. Use the title links for the source-level trace behind each title rank.</p>
      <div class="calc-summary small muted">
        <strong>Total:</strong> ${playerRow.placements.map(p => p.points.toFixed(3)).join(' + ')} = ${playerRow.total.toFixed(3)}
      </div>
      <div class="calc-list overall-calc-list">${calcRows}</div>
    </div>
  </aside>`;
}
function focusTraceCard(card){
  if(!card) return;
  const panel = card.closest('.panel-shell') || card;
  panel.scrollIntoView({block: 'start', behavior: 'auto'});
  card.focus({preventScroll: true});
}
function focusOverallTrace(){
  focusTraceCard(document.getElementById('cc-overall-trace-card'));
}
function returnToTable(){
  const table = host.querySelector('.community-layout .panel-shell');
  if(!table) return;
  table.scrollIntoView({block: 'start', behavior: 'auto'});
  const region = table.querySelector('.tabulator-tableholder, .scroll-region, .scroll-x');
  if(region && region.tabIndex >= 0) region.focus({preventScroll: true});
}
function renderOverall(player, opts={}){
  const explicit = player != null;
  const selectedGames = new Set([...currentEraSelection].filter(g => CONSENSUS_GAMES.includes(g)));
  const rows = overallRows(selectedGames);
  const selected = matchingOverallRow(rows, player);
  setActiveView('overall');
  setOverallUrl(selected && selected.player, explicit);
  host.innerHTML = `
    ${renderOverallSummary(rows, selectedGames)}
    <div class="community-layout">
      ${renderOverallTable(rows, selected)}
      ${renderOverallDetail(selected)}
    </div>
  `;
  mountOverallTable(rows, selected);
  bindOverallLinks();
  announce(selected ? `Overall ranking shown. Trace for ${selected.player}.` : 'Overall ranking shown.');
  if(opts.focusTrace){
    requestAnimationFrame(() => setTimeout(focusOverallTrace, 0));
  }
}
function bindOverallLinks(){
  host.onclick = e => {
    const back = e.target.closest('[data-cc-back]');
    if(back){
      e.preventDefault();
      returnToTable();
      return;
    }
    const overall = e.target.closest('[data-overall-player]');
    if(overall){
      e.preventDefault();
      renderOverall(overall.dataset.overallPlayer, {focusTrace: true});
      return;
    }
    const title = e.target.closest('[data-title-link]');
    if(title){
      e.preventDefault();
      renderTitle(title.dataset.titleLink, title.dataset.titlePlayer, {focusTrace: true});
    }
  };
}
function renderSummary(game, rows, sources){
  const scored = sources.filter(s => s.status === 'scored');
  const aggregate = scored.filter(s => s.source_kind === 'community_aggregate_survey').length;
  const ballots = sources.reduce((n, s) => n + sourceBallotCount(s.source_id), 0);
  const high = rows.filter(r => r.confidence === 'high').length;
  return `<div class="stat-row community-stats">
    <div class="stat"><div class="k">Ranked players</div><div class="v">${rows.length}</div></div>
    <div class="stat"><div class="k">Scored sources</div><div class="v">${scored.length}</div><div class="small faint">${aggregate} aggregate surveys</div></div>
    <div class="stat"><div class="k">Extracted ballots</div><div class="v">${ballots}</div><div class="small faint">thread ballots only</div></div>
    <div class="stat"><div class="k">High confidence</div><div class="v">${high}</div><div class="small faint">${rows.length ? Math.round(high / rows.length * 100) : 0}% of ranked rows</div></div>
  </div>`;
}
function renderTable(game, rows, selectedPlayer){
  const evidenceCol = titleEvidenceColumn(game);
  const body = rows.map(r => {
    const selected = r.player === selectedPlayer ? ' class="selected"' : '';
    const wins = rawWins(game, r.player);
    const events = winningEvents(game, r.player);
    return `<tr${selected} data-row-player="${esc(r.player)}">
      <td class="n">${r.consensus_rank}</td>
      <td><strong>${playerCell(r.player)}</strong></td>
      <td class="${evidenceCol.className}">${evidenceCol.cell(r)}</td>
      <td>${confidencePill(r.confidence)}</td>
      <td class="n">${r.source_count}</td>
      <td class="context-band n" title="${esc(events)}">${wins}</td>
      <td><a class="evidence-link" href="${esc(selectedUrl(game, r.player))}" data-select-player="${esc(r.player)}">Trace</a></td>
    </tr>`;
  }).join('');
  return `<section class="panel-shell">
    <div class="panel-head">
      <div><h2>${esc(game)} Ranking</h2><p class="small muted">${esc(evidenceCol.headingText)}</p></div>
      <span class="pill tag">Top ${rows.length} retained</span>
    </div>
    ${TableSurface.dataTable({
      label: `${game} community consensus table`,
      caption: `${game} community consensus ranking`,
      wrapperClass: 'panel-body',
      tableClass: 'data community-table',
      hint: 'Scroll sideways to see source count, event wins, and trace links.',
      head: `<thead><tr><th scope="col" class="n">Rank</th><th scope="col">Player</th><th scope="col" class="${esc(evidenceCol.className)}">${esc(evidenceCol.title)}</th><th scope="col">Conf.</th><th scope="col" class="n">Sources</th><th scope="col" class="context-band n" title="Context only — never affects the community score">Event wins</th><th scope="col">Trace</th></tr></thead>`,
      rows: body
    })}
    <p class="small muted cc-legend">Confidence — <strong>high</strong>: aggregate survey or 5+ scored sources · <strong>medium</strong>: 3–4 · <strong>low</strong>: 1–2, treat as provisional. <a href="methodology.html#community-confidence">How confidence works →</a></p>
  </section>`;
}
function aggregateDetailText(src, hit){
  const detail = hit && hit.source_detail;
  if(!detail) return '';
  const parts = [];
  const totals = src && src.detail_totals || {};
  const firstPlaceTotal = totals.best_player_votes;
  const respondents = totals.respondents;
  if(respondents && detail.top_10_inclusion_votes !== undefined){
    const approx = detail.estimated_from_chart || totals.estimated_from_chart ? 'about ' : '';
    const share = detail.top_10_inclusion_pct !== undefined
      ? Number(detail.top_10_inclusion_pct) / 100
      : detail.top_10_inclusion_share !== undefined
      ? Number(detail.top_10_inclusion_share)
      : Number(detail.top_10_inclusion_votes) / Number(respondents);
    parts.push(`${approx}${fmtInt(detail.top_10_inclusion_votes)}/${fmtInt(respondents)} top-10 inclusions (${fmtPct1(share)})`);
  } else if(detail.top_10_inclusion_pct !== undefined){
    const approx = detail.estimated_from_chart || totals.estimated_from_chart ? 'about ' : '';
    parts.push(`${approx}${Number(detail.top_10_inclusion_pct).toFixed(1)}% top-10 inclusion`);
  }
  if(firstPlaceTotal && Number(detail.best_player_votes || 0) > 0){
    const share = detail.best_player_vote_share !== undefined
      ? Number(detail.best_player_vote_share)
      : Number(detail.best_player_votes) / Number(firstPlaceTotal);
    parts.push(`${fmtInt(detail.best_player_votes)}/${fmtInt(firstPlaceTotal)} first-place votes (${fmtPct1(share)})`);
  }
  const bucket = [
    ['ranks_2_5_votes', '2-5'],
    ['ranks_6_10_votes', '6-10'],
    ['ranks_2_10_votes', '2-10'],
    ['ranks_11_20_votes', '11-20'],
    ['ranks_21_30_votes', '21-30'],
    ['top_10_votes', 'top 10'],
    ['top_20_votes', 'top 20'],
    ['top_30_votes', 'top 30'],
  ].find(([key]) => detail[key] !== undefined && Number(detail[key] || 0) > 0);
  if(bucket && parts.length < 2){
    parts.push(`${fmtInt(detail[bucket[0]])} ${bucket[1]}`);
  }
  if(!parts.length && detail.source_points !== undefined){
    parts.push(`${fmtInt(detail.source_points)} source points`);
  }
  return parts.join('; ');
}
function sourceEvidence(sourceId, player){
  const key = playerLookupKey(player);
  const src = sourceById[sourceId];
  if(src && Array.isArray(src.ranked_players)){
    const hit = aggregatePlayerHit(src, player);
    if(hit){
      const detail = aggregateDetailText(src, hit);
      return `Ranked #${hit.rank} of ${src.ranking_size || src.ranked_players.length}${detail ? `; ${detail}` : ''}`;
    }
  }
  const ballots = ballotsBySource[sourceId] || [];
  const ranks = [];
  ballots.forEach(b => (b.entries || []).forEach(en => {
    if(playerLookupKey(en.player) === key) ranks.push(Number(en.rank));
  }));
  if(ranks.length){
    const lo = Math.min(...ranks), hi = Math.max(...ranks);
    const where = ballots.length === 1 ? 'in this ballot' : `across ${ranks.length} of ${ballots.length} ballots`;
    return lo === hi ? `Ranked #${lo} ${where}` : `Ranked #${lo}–#${hi} ${where}`;
  }
  return '';
}
function renderTrace(game, player){
  const rows = gameContributions(game, player);
  const rank = (CC.consensus.games[game] || []).find(r => r.player === player);
  if(!rank) return '';
  const items = rows.map(c => {
    const avg = c.weight ? c.contribution / c.weight : 0;
    const ballots = c.ballot_count || sourceBallotCount(c.id);
    const evidence = sourceEvidence(c.id, player);
    return `<div class="calc-row">
      <div class="calc-row-head"><span class="calc-title">${sourceUrl(c.source)}</span><span class="contribution">${c.contribution.toFixed(3)}</span></div>
      ${evidence ? `<span class="sub cc-evidence"><strong>${esc(evidence)}</strong></span>` : ''}
      <span class="sub">${sourceLabel(c.source_kind)} · ${ballots} ballot${ballots === 1 ? '' : 's'} · ${sourceLabel(c.source && c.source.coverage)}</span>
      <div class="calc-math">
        <span class="math-chip"><span class="k">Avg points</span><span class="v">${avg.toFixed(3)}</span></span>
        <span class="math-op">×</span>
        <span class="math-chip"><span class="k">Source weight</span><span class="v">${Number(c.weight || 0).toFixed(3)}</span></span>
        <span class="math-op">=</span>
        <span class="math-chip"><span class="k">Contribution</span><span class="v">${c.contribution.toFixed(3)}</span></span>
      </div>
    </div>`;
  }).join('') || '<p class="small muted">No positive source contribution for this selected player.</p>';
  return `<aside class="panel-shell">
    <div class="panel-head">
      <div><h2>${esc(player)} Trace</h2><p class="small muted">What each community source said about ${esc(player)} in ${esc(game)}, and how much it counts.</p></div>
      <span class="pill tag">Rank #${rank.consensus_rank}</span>
    </div>
    <div class="panel-body" id="cc-title-trace-card" tabindex="-1">
      <a class="cc-backlink" href="#" data-cc-back>← Back to ranking</a>
      <div class="mini-grid community-mini-grid">
        <div class="mini"><div class="k">Score</div><div class="v">${Number(rank.consensus_score).toFixed(2)}</div></div>
        <div class="mini"><div class="k">Sources</div><div class="v">${rank.source_count}</div></div>
        <div class="mini"><div class="k">Confidence</div><div class="v sm">${esc(rank.confidence)}</div></div>
        <div class="mini"><div class="k">Wins</div><div class="v">${rawWins(game, player)}<span class="sub">not scored</span></div></div>
      </div>
      <p class="small muted">Contribution = the player's average rank-points inside a source multiplied by that source's final weight.</p>
      <span class="formula">contribution = avg_rank_points × final_source_weight</span>
      <div class="calc-list">${items}</div>
    </div>
  </aside>`;
}
function renderSourceLedger(game, sources){
  const rows = sources.map(s => {
    const count = sourceBallotCount(s.source_id);
    const c = (CC.consensus.source_contributions || {})[s.source_id];
    const weight = c && c.weight != null ? Number(c.weight).toFixed(3) : '—';
    return `<tr>
      <td>${sourceUrl(s)}<span class="sub">${esc(s.source_id)}</span></td>
      <td>${sourceStatusPill(s.status)}</td>
      <td>${sourceLabel(s.source_kind)}</td>
      <td>${sourceLabel(s.coverage)}</td>
      <td>${sourceLabel(s.season_coverage || 'unknown')}</td>
      <td class="n">${count || s.valid_ballots || '—'}</td>
      <td class="n">${weight}</td>
    </tr>`;
  }).join('');
  return `<section class="panel-shell source-ledger">
    <div class="panel-head"><div><h2>Source Ledger</h2><p class="small muted"><strong>Scored</strong> sources count toward the ranking. <strong>Reviewed not scored</strong> sources were found but had no cleanly extractable ranked list. <strong>Excluded</strong> sources are media lists, official awards, or stat lists, so they are kept out of the community ranking.</p></div></div>
    ${TableSurface.dataTable({
      label: `${game} source ledger`,
      caption: `${game} community consensus source ledger`,
      wrapperClass: 'panel-body',
      hint: 'Scroll sideways to see source type, timing, coverage, ballot count, and weight.',
      head: '<thead><tr><th scope="col">Source</th><th scope="col">Status</th><th scope="col">Type</th><th scope="col">Timing</th><th scope="col">Coverage</th><th scope="col" class="n">Ballots</th><th scope="col" class="n">Weight</th></tr></thead>',
      rows
    })}
  </section>`;
}
function focusTitleTrace(){
  focusTraceCard(document.getElementById('cc-title-trace-card'));
}
function renderTitle(game, player, opts={}){
  host.onclick = null;
  const explicit = player != null;
  if(!CC.consensus.games[game]) game = defaultConsensusGame();
  const rows = (CC.consensus.games[game] || []).filter(r => r.ranked);
  const sources = gameSources(game);
  const selectedRow = matchingConsensusRow(rows, player);
  const selected = selectedRow ? selectedRow.player : (rows[0] && rows[0].player);
  setActiveView('title');
  setTitleUrl(game, selected, explicit);
  gameSel.value = game;
  host.innerHTML = `
    ${renderSummary(game, rows, sources)}
    <div class="community-layout">
      ${renderTable(game, rows, selected)}
      ${renderTrace(game, selected)}
    </div>
    ${renderSourceLedger(game, sources)}
  `;
  host.querySelectorAll('[data-select-player]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      renderTitle(game, a.dataset.selectPlayer, {focusTrace: true});
    });
  });
  host.querySelectorAll('.community-table tbody tr[data-row-player]').forEach(tr => {
    tr.addEventListener('click', e => {
      if(e.target.closest('a,button,input,label,select,textarea')) return;
      renderTitle(game, tr.dataset.rowPlayer, {focusTrace: true});
    });
  });
  host.querySelectorAll('[data-cc-back]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      returnToTable();
    });
  });
  announce(selected ? `${game} ranking shown. Trace for ${selected}.` : `${game} ranking shown.`);
  if(opts.focusTrace){
    requestAnimationFrame(() => setTimeout(focusTitleTrace, 0));
  }
}

fetch('community-consensus.json')
  .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
  .then(data => {
    CC = data;
    sourceById = Object.fromEntries((CC.sources || []).map(s => [s.source_id, s]));
    ballotsBySource = {};
    (CC.ballots || []).forEach(b => (ballotsBySource[b.source_id] ||= []).push(b));
    const games = titleOrder(Object.keys(CC.consensus.games || {}));
    CONSENSUS_GAMES = games;
    ERA_HELPERS = buildEraHelpers(games);
    gameSel.innerHTML = games.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');
    const state = readState();
    currentEraSelection = state.eras;
    mountCommunityEraMenu(currentEraSelection, sel => {
      currentEraSelection = sel;
      renderOverall(new URLSearchParams(location.search).get('p'));
    });
    gameSel.value = state.game;
    if(state.view === 'title') renderTitle(state.game, state.player, {focusTrace: !!state.player});
    else renderOverall(state.overallPlayer, {focusTrace: !!state.overallPlayer});
    document.querySelectorAll('[data-cc-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        if(btn.dataset.ccView === 'title') renderTitle(gameSel.value || defaultConsensusGame(), null);
        else renderOverall(null);
      });
    });
    gameSel.addEventListener('change', () => renderTitle(gameSel.value, null));
    shareBtn.addEventListener('click', async () => {
      const ok = await copyText(location.href);
      shareBtn.textContent = ok ? 'Copied' : 'Copy failed';
      announce(ok ? 'Link copied to clipboard.' : 'Copy failed — copy the address bar URL instead.');
      setTimeout(() => shareBtn.textContent = 'Share view', 1800);
    });
  })
  .catch(err => {
    console.error(err);
    host.innerHTML = '<p class="note">Community consensus data failed to load.</p>';
  })
  .finally(() => mountFoot());
</script>
