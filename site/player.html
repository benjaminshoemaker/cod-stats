<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player · CoD Era-Adjusted</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="A Call of Duty player's major tournament wins, era-adjusted season by season, with their world championship count.">
<meta property="og:type" content="profile">
<meta property="og:site_name" content="CoD Major Wins · Era-Adjusted">
<meta property="og:title" content="Era-Adjusted Major Wins · Player">
<meta property="og:description" content="Every major win broken down by season, each weighted by how many majors that season had.">
<meta property="og:image" content="https://cod-stats-one.vercel.app/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://cod-stats-one.vercel.app/assets/og.png">
<link rel="stylesheet" href="assets/style.css">
<link rel="preload" href="assets/nav.js" as="script">
<script src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js"
  integrity="sha384-Osd4ws6GMOft3r45orGjXi52w62BlTXpUzyK7/1Uk4v9xe0hhJD5rFJKDjFpM5Pv" crossorigin="anonymous"></script>
</head>
<body>
<script src="assets/nav.js"></script>
<main class="wrap" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="similarity.js"></script>
<script src="assets/app.js?v=team-logos"></script>
<script>
mountNav('index.html');
const name = qs('p');
const lb = D.leaderboard.find(r=>r.name===name);
const p = D.players[name];
const root = document.getElementById('root');

if(!p || !lb){
  root.innerHTML = `<p class="crumb"><a href="index.html">← Leaderboard</a></p>
    <h1>Player not found</h1><p class="muted">No leaderboard data for "${esc(name||'')}".</p>`;
  mountFoot();
}else{
  document.title = `${p.name} · CoD Era-Adjusted`;
  const maxMajors = Math.max(...D.meta.seasonOrder.map(g=>D.majors[g]));
  const avgPlace = p.avg_place == null ? '–' : p.avg_place.toFixed(1);
  const compareHref = `compare.html?p=${encodeURIComponent(p.name)}`;
  const profileRole = roleSummary(p);
  const roleTable = (p.role_by_game || []).map(r => `<tr>
      <td>${gameLink(r.game)}</td>
      <td><span class="role-cell">${rolePill(r.role)} ${roleDisputeLink(p.name, r.game, r.role)}</span></td>
      <td class="n">${r.year || ''}</td>
    </tr>`).join('');
  const teamLogo = team => {
    const logo = D.teamLogos && D.teamLogos[team];
    return logo && logo.src
      ? `<img class="team-logo" src="${esc(logo.src)}" alt="" title="${esc(team)}" decoding="async" onerror="this.remove()">`
      : `<span class="team-dot" title="${esc(team)}">${esc(team[0]||'?')}</span>`;
  };
  const teamSummary = teams => teams&&teams.length ? `
    <div class="team-history" id="team-history">
      <button class="team-summary" type="button" id="team-summary" aria-expanded="false" aria-controls="team-strip">
        <span class="team-stack" aria-hidden="true">${teams.slice(0,4).map(teamLogo).join('')}</span>
        <span>${teams.length} team${teams.length===1?'':'s'}</span>
      </button>
      <div class="team-strip" id="team-strip" hidden aria-label="${esc(p.name)} teams">${teams.map(t=>teamBadge(t)).join('')}</div>
    </div>` : '';
  const honors = p.honors || [];
  const honorsRows = honors.map(h=>`<tr>
      <td><span class="pill tag">${esc(h.label)}</span></td>
      <td>${esc(h.event)}${h.game?`<div class="small faint">${esc(h.game)}</div>`:''}</td>
      <td class="n">${esc(h.year)}</td>
      <td><a href="${esc(h.sourceUrl)}" target="_blank" rel="noopener">${esc(h.source)} ↗</a></td>
    </tr>`).join('');
  const honorsSection = `<section class="honors-block" id="honors">
      <h2>Honors ${anchorLink('honors','Honors')}</h2>
      <p class="small muted">MVP, All-Star, All-Pro and Rookie/Player of the Year recognition from the CoD Esports Wiki awards table. This is profile context only, not part of the era-adjusted score. Early-era award coverage is incomplete and non-standardized, so a blank list means no row in the current source set, not necessarily zero career honors.</p>
      ${honors.length ? `<div class="scroll-x"><table class="data honors-table">
        <thead><tr><th>Award</th><th>Event or season</th><th class="n">Year</th><th>Source</th></tr></thead>
        <tbody>${honorsRows}</tbody>
      </table></div>` : '<p class="small faint">No honors found in the current source set.</p>'}
    </section>`;

  root.innerHTML = `
    <p class="crumb"><a href="index.html">← Leaderboard</a></p>
    <div class="profile-head">
      <h1>${esc(p.name)}</h1>
      <a class="sharebtn" href="${compareHref}">Compare</a>
    </div>
    <p class="small muted" style="margin:-.3rem 0 var(--space-3)">Source:
      <a href="https://cod-esports.fandom.com/wiki/${encodeURIComponent(p.wiki.replace(/ /g,'_'))}" target="_blank" rel="noopener">${esc(p.name)} on the CoD Esports Wiki ↗</a></p>
    ${teamSummary(p.teams)}
    ${pageToc([
      ['adjusted-wins','Adjusted wins'],
      ['major-wins','Major list'],
      ['honors','Honors'],
      ['roles','Roles'],
      ['similar','Similar players']
    ])}
    <div class="stat-row">
      <div class="stat"><div class="k">Raw major wins</div><div class="v">${p.raw}</div><div class="small faint">wiki rank #${lb.rawRank}</div></div>
      <div class="stat"><div class="k">Events placed</div><div class="v">${p.events_placed}</div><div class="small faint">counted major finishes</div></div>
      <div class="stat"><div class="k">Average placement</div><div class="v">${avgPlace}</div><div class="small faint">lower is better</div></div>
      <div class="stat"><div class="k">Primary role</div><div class="v sm">${rolePill(profileRole)}</div><div class="small faint">${profileRole==='Mixed'?'varies by season':'curated'}</div></div>
      <div class="stat" id="tile-all"><div class="k">Adjusted wins</div><div class="v">${p.adj_all.toFixed(1)}</div><div class="small faint">rank #${lb.adjRank} ${lb.delta?deltaPill(lb.delta):''}</div></div>
      <div class="stat"><div class="k">Peak season</div><div class="v" id="tile-peak">${Math.round(p.peak_all.wins/p.peak_all.majors*100)}%</div>
        <div class="small faint" id="tile-peak-sub">&nbsp;</div></div>
      <div class="stat"><div class="k">Eras (titles)</div><div class="v" id="tile-eras">${p.titles_all}</div>
        <div class="small faint" id="tile-eras-sub">&nbsp;</div></div>
      <div class="stat"><div class="k">World Championships</div><div class="v">${p.champs||0}</div>
        <div class="small faint">${p.champs?p.champ_events.map(e=>e.year).join(' · '):'none'}</div></div>
    </div>
    ${p.champs?`<p class="small muted" style="margin-top:-.4rem"><span class="pill champ">◆</span> ${esc(p.name)} is a <strong>${p.champs}×</strong> Call of Duty World Champion: ${p.champ_events.map(e=>esc(e.event)).join(', ')}. (Championships are one per year, shown unweighted.)</p>`:''}
    ${p.note?`<div class="note" style="margin-top:var(--space-2);background:var(--panel);border-color:var(--line);color:var(--muted)"><strong>On this total.</strong> ${esc(p.note)} <a href="methodology.html#tournaments">See methodology →</a></div>`:''}
    <section class="adjusted-explainer" id="adjusted-wins">
      <h2>How adjusted wins work for ${esc(p.name)} ${anchorLink('adjusted-wins','Adjusted wins')}</h2>
      <p class="lede">Adjusted wins measure how much of each season's available majors this player won. Each season gets
      equal total weight, so a win in a smaller schedule counts more than a win in a packed season.</p>
      <div class="grid cols-2">
        <div>
          <h3>Season-share buildup</h3>
          <p class="small muted">Each win is worth <span class="num">1 ÷ (majors that season)</span>. Sum those across seasons to get the season-share, then &times; the average majors/season for the adjusted total.</p>
          <div id="buildup"></div>
        </div>
        <div>
          <h3>Wins vs. opportunity</h3>
          <p class="small muted">Dark = wins. Faint = majors available that season. A short dark bar inside a long faint bar means lots of competition for few titles.</p>
          <div id="chart"></div>
        </div>
      </div>
    </section>

    <section id="major-wins">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-2);margin-top:1.6em">
        <h2 style="margin:0" id="ml-title">Every major win (${p.raw}) ${anchorLink('major-wins','Major list')}</h2>
        <div class="seg" role="group" aria-label="Show wins only or every major entered">
          <button id="seg-wins" aria-pressed="true">Wins (${p.raw})</button>
          <button id="seg-all" aria-pressed="false">All entered (${lb.eventsPlaced})</button>
        </div>
      </div>
      <div class="scroll-x"><table class="data"><tbody id="winlist"></tbody></table></div>
      <p class="small faint" id="ml-note" style="margin-top:var(--space-2)"></p>
    </section>

    ${honorsSection}

    <section id="roles">
      <h2>Primary role by season ${anchorLink('roles','Roles')}</h2>
      <p class="small muted">Roles are curated as AR, Flex, or SMG. Unknown or disputed seasons can be challenged with evidence.</p>
      <div class="scroll-x"><table class="data role-table">
        <thead><tr><th>Season</th><th>Role</th><th class="n">Year</th></tr></thead>
        <tbody>${roleTable || '<tr><td colspan="3" class="small faint">No role rows available.</td></tr>'}</tbody>
      </table></div>
    </section>

    <section id="similar"></section>
  `;

  function render(){
    const shown = p.seasons;
    const mbar  = D.meta.mbarAll;
    const share = p.share_all;
    const adj   = p.adj_all;

    // build-up table
    const rows = shown.map(s=>`<tr>
        <td>${gameLink(s.game)} ${s.pre_bo2?'<span class="pill warn small">pre-BO2</span>':''}${s.held>s.majors?`<span class="pill tag small">${s.majors} of ${s.held} held</span>`:''}${s.held<s.majors?`<span class="pill tag small">in progress · ${s.held} of ${s.majors} played</span>`:''}</td>
        <td class="n">${s.wins}</td><td class="n">${s.majors}</td>
        <td class="n">${(1/s.majors).toFixed(3)}</td>
        <td class="n"><strong>${s.share.toFixed(3)}</strong></td>
        <td><div class="bar-track bar-share"><div class="bar-fill" style="width:${(s.share*100).toFixed(1)}%"></div></div></td>
      </tr>`).join('');
    const winsShown = shown.reduce((a,s)=>a+s.wins,0);
    document.getElementById('buildup').innerHTML = `
      <div class="scroll-x"><table class="data">
        <thead><tr><th>Season</th><th class="n">Wins</th><th class="n">Majors</th><th class="n">Per win</th><th class="n">Share</th><th>&nbsp;</th></tr></thead>
        <tbody>${rows}
          <tr style="border-top:2px solid var(--line-2)"><td><strong>Total</strong></td>
            <td class="n"><strong>${winsShown}</strong></td><td class="n faint">–</td><td class="n faint">–</td>
            <td class="n"><strong>${share.toFixed(3)}</strong></td>
            <td class="small muted">× ${mbar.toFixed(2)} = <strong>${adj.toFixed(1)}</strong></td></tr>
        </tbody>
      </table></div>`;

    // chart
    document.getElementById('chart').innerHTML = shown.map(s=>`<div style="margin:var(--space-1) 0">
        <div class="small muted" style="display:flex;justify-content:space-between">
          <span>${esc(s.game)}</span><span class="num">${s.wins} / ${s.majors} majors</span></div>
        <div class="bar-track" style="height:14px;position:relative;background:var(--panel-2)">
          <div class="bar-fill amber" style="width:${(s.majors/maxMajors*100).toFixed(1)}%;opacity:.28"></div>
          <div class="bar-fill" style="width:${(s.wins/maxMajors*100).toFixed(1)}%;position:absolute;top:0;left:0"></div>
        </div></div>`).join('') || '<p class="small faint">No included seasons.</p>';

    // full major list — wins only (default) or every major entered (auditable)
    renderMajors(majorsMode);

    // peak + eras tile sub-lines
    const pk = p.peak_all, titles = p.titles_all, span = p.span_all;
    document.getElementById('tile-peak').textContent = pk.majors ? `${Math.round(pk.wins/pk.majors*100)}%` : '–';
    document.getElementById('tile-peak-sub').textContent = pk.season ? `${pk.wins} of ${pk.majors} · ${pk.season}` : '–';
    document.getElementById('tile-eras').textContent = titles;
    document.getElementById('tile-eras-sub').textContent = span ? `${span}-yr span` : '–';
  }

  // ---- "Every major" section: wins-only (default) vs every major entered ----
  // participation.json is ~0.5 MB across all players, so it's fetched only when
  // the "All entered" view is first opened, never on page load
  let PART = null, partReq = null;
  const orderIdx = Object.fromEntries(D.meta.seasonOrder.map((g,i)=>[g,i]));
  let majorsMode = 'wins';
  const ord = n => { const s=['th','st','nd','rd'], v=n%100; return n + (s[(v-20)%10] || s[v] || s[0]); };
  const placeLabel = pl => /^\d+$/.test(pl) ? ord(+pl) : (pl || '—');
  const avgPlaceLabel = rows => {
    const n = rows.length, sum = rows.reduce((a,m)=>a+(m.placeX2||0),0);
    return n ? (sum/2/n).toFixed(1) : '–';
  };
  function winsView(){
    return p.seasons.map(s=>{
      const evs = s.events.map(e=>`<tr>
          <td class="faint num small">${yr(e.date)}</td><td>${esc(e.event)}</td>
          <td class="team-cell">${teamBadge(e.team)}</td>
          <td class="n faint">+${e.weight.toFixed(3)}</td></tr>`).join('');
      return `<tr class="subhead"><td colspan="4">${esc(s.game)}: ${s.wins} win${s.wins>1?'s':''}, each worth 1/${s.majors} = ${(1/s.majors).toFixed(3)}</td></tr>${evs}`;
    }).join('');
  }
  function allView(){
    if(!PART) return `<tr><td class="small faint">Loading the full major list…</td></tr>`;
    if(!PART.length) return `<tr><td class="small faint">No participation data available for this player.</td></tr>`;
    const byGame = {}; PART.forEach(m=>{ (byGame[m.game]=byGame[m.game]||[]).push(m); });
    return Object.keys(byGame).sort((a,b)=>orderIdx[a]-orderIdx[b]).map(g=>{
      const rows = byGame[g].slice().sort((a,b)=> (a.date<b.date?-1:1));
      const won = rows.filter(m=>m.won).length;
      const body = rows.map(m=>`<tr${m.won?'':' class="faint"'}>
          <td class="num small">${yr(m.date)}</td><td>${esc(m.event)}</td>
          <td class="team-cell">${teamBadge(m.team)}</td>
          <td class="n">${m.won?'<span class="pill champ">1st</span>':esc(placeLabel(m.place))}</td></tr>`).join('');
      return `<tr class="subhead"><td colspan="4">${esc(g)}: won ${won} of ${rows.length} major${rows.length>1?'s':''} entered · avg place ${avgPlaceLabel(rows)}</td></tr>${body}`;
    }).join('');
  }
  function renderMajors(mode){
    majorsMode = mode;
    if(mode==='all' && !PART){
      partReq = partReq || fetch('participation.json').then(r=>r.json()).catch(()=>({}))
        .then(all=>{ PART = all[p.name] || []; if(majorsMode==='all') renderMajors('all'); });
    }
    document.getElementById('winlist').innerHTML = mode==='all' ? allView() : winsView();
    document.getElementById('ml-title').innerHTML = `${mode==='all' ? `Every major entered (${lb.eventsPlaced})` : `Every major win (${p.raw})`} ${anchorLink('major-wins','Major list')}`;
    document.getElementById('seg-wins').setAttribute('aria-pressed', String(mode!=='all'));
    document.getElementById('seg-all').setAttribute('aria-pressed', String(mode==='all'));
    document.getElementById('ml-note').textContent = mode==='all'
      ? 'Average placement and events placed are calculated from this same normalized list. Tied ranges use their midpoint; Warzone/Mobile excluded, same as the wins.'
      : '';
  }

  render();
  const teamBtn = document.getElementById('team-summary');
  if(teamBtn){
    teamBtn.addEventListener('click', ()=>{
      const strip = document.getElementById('team-strip');
      const expanded = teamBtn.getAttribute('aria-expanded') === 'true';
      teamBtn.setAttribute('aria-expanded', String(!expanded));
      strip.hidden = expanded;
    });
  }
  document.getElementById('seg-wins').addEventListener('click', ()=>renderMajors('wins'));
  document.getElementById('seg-all').addEventListener('click', ()=>renderMajors('all'));
  mountSimilar(p.name);

  mountFoot();
  scrollToHashTarget();
}

// ---- Similar players block (data: window.SIM) ----
function mountSimilar(name){
  const host = document.getElementById('similar');
  const SIM = window.SIM;
  const me = SIM && SIM.players[name];
  if(!me){ return; }                     // e.g. player outside the 91 with metrics

  const fmt = (code,v)=>{
    if(v==null) return '–';
    if(code==='pct') return Math.round(v*100)+'%';
    if(code==='dec1') return (Math.round(v*10)/10).toFixed(1);
    return String(Math.round(v));
  };
  // same cutoff the solo comp lists were built with — shipped in similarity.js
  const mate = cw => cw >= SIM.config.teammateThr;
  let mode = 'solo';                      // default: "didn't win together"
  let sel  = null;

  host.innerHTML = `
    <h2>Similar players ${anchorLink('similar','Similar players')}</h2>
    <p class="small muted">Closest résumés by <strong>achievement</strong> (success, peak, placement,
      longevity, and career path), all measured era-independently. When a player debuted is not scored, so comps can cross eras.</p>
    <details class="sim-method">
      <summary>How these are computed</summary>
      <div class="sim-method-body">
        <p>Each player is a résumé vector across five groups, and the score is the weighted distance
        between two players, rescaled to <span class="num">0–100</span> (100 = identical résumé):</p>
        <ul>
          <li><strong>Success</strong> — era-adjusted wins, World Championships, and win conversion (share of majors entered that were won).</li>
          <li><strong>Peak</strong> — best single season, era-adjusted.</li>
          <li><strong>Placement</strong> — how often they reached a final (top&#8209;2) or a top&#8209;4. Held at low weight, since bracket sizes differ by era.</li>
          <li><strong>Longevity</strong> — distinct titles won and career span in years.</li>
          <li><strong>Career path</strong> — teams played for and average years per team.</li>
          <li><strong>Role</strong> — a small season-overlap adjustment for AR/Flex/SMG similarity; unknown seasons are ignored.</li>
        </ul>
        <p><strong>Everything is era-independent by design.</strong> Each stat is either era-adjusted,
        a rate, or a count of years, so a 2013 career and a 2023 career meet on equal footing.
        <strong>Raw win totals and majors-attended are deliberately excluded</strong> — early seasons
        held ~17 majors a year versus 6–7 today, so those numbers mostly measure the era's calendar,
        not the player. Debut year is shown only as context and never scored.</p>
        <p><strong>“Didn't win together”</strong> hides players who shared most of their titles with
        this one — a dynasty teammate is an obvious match, not an insight. <strong>“Everyone”</strong>
        brings them back, tagged with their share of shared wins.</p>
      </div>
    </details>
    <div class="sim-controls">
      <div class="seg" id="sim-seg">
        <button data-mode="solo" aria-pressed="true">Didn't win together</button>
        <button data-mode="all" aria-pressed="false">Everyone</button>
      </div>
    </div>
    <div id="sim-list"></div>
    <div id="sim-compare"></div>`;

  function renderList(){
    const rows = me[mode];
    if(!rows.length){ document.getElementById('sim-list').innerHTML =
      `<p class="small faint">No non-teammate comps: this player won alongside all their closest matches.</p>`; return; }
    document.getElementById('sim-list').innerHTML = rows.map((r,i)=>`
      <button class="sim-row${r.name===sel?' active':''}" data-comp="${esc(r.name)}" aria-expanded="${r.name===sel}">
        <span class="rk num">${i+1}</span>
        <span class="nm">${esc(r.name)}</span>
        <span class="track"><i style="width:${r.score}%"></i></span>
        <span class="sc num">${r.score}</span>
        <span class="tags">${mate(r.cowin)
          ? `<span class="pill mate">teammate · ${Math.round(r.cowin*100)}% shared</span>`
          : `<span class="pill solo">no shared wins</span>`}</span>
      </button>`).join('');
    document.querySelectorAll('#sim-list .sim-row').forEach(b=>b.onclick=()=>{
      sel = (sel===b.dataset.comp) ? null : b.dataset.comp;
      renderList(); renderCompare();
      // on phones the comparison renders below the list; bring it on screen
      if(sel && window.matchMedia('(max-width:760px)').matches){
        const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        document.getElementById('sim-compare').scrollIntoView({block:'nearest',behavior:reduce?'auto':'smooth'});
      }
    });
  }

  function renderCompare(){
    const box = document.getElementById('sim-compare');
    if(!sel){ box.innerHTML=''; return; }
    const B = SIM.players[sel]; if(!B){ box.innerHTML=''; return; }
    const A = me;
    let body = '';
    SIM.config.groups.forEach(([g,mets])=>{
      body += `<tr><td colspan="4" class="sim-gname">${esc(g)}</td></tr>`;
      mets.forEach(([k,lab,code])=>{
        const pa=A.metrics[k].p, pb=B.metrics[k].p;
        const d = (pa==null||pb==null)?999:Math.abs(pa-pb);
        const cls = d<=8?'aligned':d<=25?'close':'differs';
        body += `<tr><td class="sim-metric">${lab}</td>
          <td class="sim-v va">${fmt(code,A.metrics[k].v)}</td>
          <td class="sim-v vb">${fmt(code,B.metrics[k].v)}</td>
          <td class="sim-tag ${cls}"><span class="dot"></span>${cls}</td></tr>`;
      });
    });
    // era shown as context, explicitly not scored
    body += `<tr><td colspan="4" class="sim-gname">Context <span class="faint" style="text-transform:none;letter-spacing:0">· not scored</span></td></tr>
      <tr><td class="sim-metric">First major</td><td class="sim-v va">${A.debut??'–'}</td>
      <td class="sim-v vb">${B.debut??'–'}</td><td class="sim-tag"></td></tr>`;
    box.innerHTML = `
      <div class="sim-cmp-head">Comparing <span class="va">${esc(name)}</span> with <span class="vb">${esc(sel)}</span>
        <a class="small" href="compare.html?p=${encodeURIComponent(name)}&p=${encodeURIComponent(sel)}">compare both →</a>
        <a class="small" href="player.html?p=${encodeURIComponent(sel)}">open profile →</a></div>
      <div style="overflow-x:auto"><table class="sim-table">
        <thead><tr><th class="l">Metric</th><th>${esc(name)}</th><th>${esc(sel)}</th><th>Match</th></tr></thead>
        <tbody>${body}</tbody></table></div>`;
  }

  document.querySelectorAll('#sim-seg button').forEach(b=>b.onclick=()=>{
    mode=b.dataset.mode; sel=null;
    document.querySelectorAll('#sim-seg button').forEach(x=>x.setAttribute('aria-pressed', x===b));
    renderList(); renderCompare();
  });
  renderList(); renderCompare();
}
