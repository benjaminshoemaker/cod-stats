<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seasons & the Major Count — CoD Era-Adjusted</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="How many majors each Call of Duty season had, and how the era weighting (1 ÷ majors per season) works.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="CoD Major Wins — Era-Adjusted">
<meta property="og:title" content="Seasons & the major count">
<meta property="og:description" content="Majors per Call of Duty season ranged from 3 to 17, which is why raw win totals flatter early-era players.">
<meta property="og:url" content="https://cod-stats-one.vercel.app/games.html">
<meta property="og:image" content="https://cod-stats-one.vercel.app/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Seasons & the major count">
<meta name="twitter:image" content="https://cod-stats-one.vercel.app/assets/og.png">
<link rel="stylesheet" href="assets/style.css">
<script src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js" crossorigin="anonymous"></script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script>
mountNav('games.html');
const root=document.getElementById('root');
const games=D.games.slice().sort((a,b)=>a.order-b.order);
const maxM=Math.max(...games.map(g=>g.majors));
const minM=Math.min(...games.map(g=>g.majors));
const avg=D.meta.mbarAll;

let hasSplit=false;
let rows=games.map(g=>{
  const split = g.denom !== g.majors;        // structurally-restricted season (e.g. MW 2019)
  if(split) hasSplit=true;
  const ratio=g.majors/avg;
  const tag = g.preBo2?'<span class="pill warn small">pre-BO2</span>'
            : split?`<span class="pill tag small">${g.denom} of ${g.majors} per team</span>`:'';
  return `<tr>
    <td>${gameLink(g.game)} ${tag}</td>
    <td class="n faint">${yr(g.firstDate)}</td>
    <td class="n"><strong>${g.majors}</strong></td>
    <td class="n">${g.weight.toFixed(3)}</td>
    <td style="min-width:160px"><div class="bar-track"><div class="bar-fill ${g.majors>=avg?'amber':''}" style="width:${(g.majors/maxM*100).toFixed(0)}%"></div></div></td>
    <td class="n"><span class="${g.majors>avg?'delta down':'delta up'}">${g.majors>avg?'▲':'▼'} ${ratio.toFixed(2)}×</span></td>
  </tr>`;
}).join('');

root.innerHTML=`
  <h1>Seasons &amp; the major count</h1>
  <p class="lede">Each Call of Duty title is one competitive "season". The number of majors per season ranged
  from <strong>17 (Black Ops 2)</strong> down to <strong>6</strong> in recent years. That swing is the whole reason raw win totals
  flatter early-era players. The weighting makes a win worth <span class="num">1 ÷ majors</span> of its season.</p>

  <div class="stat-row">
    <div class="stat"><div class="k">Seasons</div><div class="v">${D.meta.consoleSeasons}</div></div>
    <div class="stat"><div class="k">Total majors</div><div class="v">${D.meta.consoleMajors}</div></div>
    <div class="stat"><div class="k">Avg majors / season</div><div class="v sm">${avg.toFixed(2)}</div></div>
    <div class="stat"><div class="k">Range</div><div class="v sm">${minM}–${maxM}</div></div>
  </div>

  <table class="data">
    <thead><tr><th>Season</th><th class="n">First major</th><th class="n">Majors</th>
      <th class="n">Per win</th><th>Relative volume</th><th class="n">vs avg</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <p class="small muted">A "vs avg" above 1.0× (red) means that season had more majors than average, so each win there is worth
  proportionally less.${hasSplit?` <strong>Modern Warfare 2019</strong> held 13 majors but ran a split "Home Series" format — every
  team played only 9 (8 Home Series + Champs) — so a win there is worth 1/9, not 1/13.`:''}</p>
`;
mountFoot();
</script>
</body>
</html>
