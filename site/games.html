<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seasons & the Major Count · CoD Era-Adjusted</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="How many majors each Call of Duty season had, and how season-share adjustment (1 ÷ majors per season) works.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="CoD Major Wins · Era-Adjusted">
<meta property="og:title" content="Seasons & the major count">
<meta property="og:description" content="Majors per Call of Duty season ranged from 3 to 17, which is why raw win totals flatter early-era players.">
<meta property="og:url" content="https://cod-stats-one.vercel.app/games.html">
<meta property="og:image" content="https://cod-stats-one.vercel.app/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Seasons & the major count">
<meta name="twitter:image" content="https://cod-stats-one.vercel.app/assets/og.png">
<link rel="stylesheet" href="assets/style.css">
<link rel="preload" href="assets/nav.js" as="script">
<script src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js"
  integrity="sha384-Osd4ws6GMOft3r45orGjXi52w62BlTXpUzyK7/1Uk4v9xe0hhJD5rFJKDjFpM5Pv" crossorigin="anonymous"></script>
</head>
<body>
<script src="assets/nav.js"></script>
<main class="wrap" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script>
mountNav('games.html');
const root=document.getElementById('root');
const games=D.games.slice().sort((a,b)=>a.order-b.order);
// Bars, range and "vs avg" all use the weighting denominator (what a team could
// win), so this table and the per-season pages tell the same story: 9 for
// MW 2019's split format, the full schedule for an in-progress season.
const maxM=Math.max(...games.map(g=>g.denom));
const minM=Math.min(...games.map(g=>g.denom));
const avg=D.meta.mbarAll;

let hasSplit=false, hasInprog=false;
let rows=games.map(g=>{
  const split = g.denom < g.majors;          // structurally-restricted season (e.g. MW 2019)
  const inprog = g.denom > g.majors;         // season still being played (denom = scheduled)
  if(split) hasSplit=true;
  if(inprog) hasInprog=true;
  const ratio=g.denom/avg;
  const tag = g.preBo2?'<span class="pill warn small">pre-BO2</span>'
            : split?`<span class="pill tag small">${g.denom} of ${g.majors} per team</span>`
            : inprog?`<span class="pill tag small">in progress · ${g.majors} of ${g.denom} played</span>`:'';
  return `<tr>
    <td>${gameLink(g.game)} ${tag}</td>
    <td class="n faint">${yr(g.firstDate)}</td>
    <td class="n"><strong>${g.denom}</strong>${g.denom!==g.majors?`<span class="faint small"> (${g.majors} ${split?'held':'played'})</span>`:''}</td>
    <td class="n">${g.weight.toFixed(3)}</td>
    <td class="bar-cell"><div class="bar-track"><div class="bar-fill ${g.denom>=avg?'amber':''}" style="width:${(g.denom/maxM*100).toFixed(0)}%"></div></div></td>
    <td class="n"><span class="delta flat">${g.denom>avg?'▲':'▼'} ${ratio.toFixed(2)}×</span></td>
  </tr>`;
}).join('');

root.innerHTML=`
  <h1>Seasons &amp; the major count</h1>
  <p class="lede">Each Call of Duty title is one competitive "season". The number of majors per season ranged
  from <strong>17 (Black Ops 2)</strong> down to <strong>6</strong> in recent years. That swing is why raw win totals
  flatter early-era players. The adjustment makes a win worth <span class="num">1 ÷ majors</span> of its season.</p>

  <div class="stat-row">
    <div class="stat"><div class="k">Seasons</div><div class="v">${D.meta.consoleSeasons}</div></div>
    <div class="stat"><div class="k">Total majors</div><div class="v">${D.meta.consoleMajors}</div></div>
    <div class="stat"><div class="k">Avg majors / season</div><div class="v sm">${avg.toFixed(2)}</div></div>
    <div class="stat"><div class="k">Range</div><div class="v sm">${minM}–${maxM}</div></div>
  </div>

  <div ${scrollRegionAttrs('Season major-count table')}><table class="data">
    ${tableCaption('Major count by Call of Duty season')}
    <thead><tr><th scope="col">Season</th><th scope="col" class="n">First major</th><th scope="col" class="n">Majors</th>
      <th scope="col" class="n">Per win</th><th scope="col">Relative volume</th><th scope="col" class="n">vs avg</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <p class="small muted">A "vs avg" above 1.0× means that season had more majors than average, so each win there is worth
  proportionally less.${hasSplit?` <strong>Modern Warfare 2019</strong> held 13 majors but ran a split "Home Series" format, where every
  team played only 9 (8 Home Series + Champs), so a win there is worth 1/9, not 1/13.`:''}${hasInprog?` An
  <strong>in-progress</strong> season is weighted by its full schedule of majors, not the number played so far, so
  current-season wins aren't overstated before the season finishes.`:''}</p>
`;
mountFoot();
</script>
</body>
</html>
