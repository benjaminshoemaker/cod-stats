<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raw → Adjusted · CoD Era-Adjusted</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Who era-adjustment lifts and who it discounts: raw major-win rank vs era-adjusted rank, for every Call of Duty major winner.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="CoD Major Wins · Era-Adjusted">
<meta property="og:title" content="Raw → Adjusted · CoD's biggest movers">
<meta property="og:description" content="Who era-adjustment lifts and who it discounts: raw rank vs era-adjusted rank.">
<meta property="og:url" content="https://cod-stats-one.vercel.app/shift.html">
<meta property="og:image" content="https://cod-stats-one.vercel.app/api/og">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://cod-stats-one.vercel.app/api/og">
<link rel="stylesheet" href="assets/style.css">
<script src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js"
  integrity="sha384-Osd4ws6GMOft3r45orGjXi52w62BlTXpUzyK7/1Uk4v9xe0hhJD5rFJKDjFpM5Pv" crossorigin="anonymous"></script>
<style>
  .chart-wrap{overflow-x:auto}
  svg.db{display:block;min-width:560px;width:100%;max-width:680px;height:auto;font-family:var(--sans)}
  svg.db .row{fill:var(--ink);font-size:11px}
  svg.db .era{fill:var(--faint);font-size:9.5px}
  svg.db .hint{fill:var(--muted);font-size:11px}
  svg.db .delta{font-size:9.5px}
  svg.db a{cursor:pointer}
  svg.db a:hover .row{text-decoration:underline;fill:var(--accent)}
  .key{display:flex;gap:1.2rem;align-items:center;font-size:.82rem;color:var(--muted);margin:.3rem 0}
  .key .d{width:11px;height:11px;border-radius:50%;display:inline-block;vertical-align:-1px;margin-right:.3rem}
  .sortctl{display:flex;align-items:center;gap:.5rem;margin:.4rem 0 .2rem;font-size:.85rem;color:var(--muted)}
  .segbtn{font:inherit;font-size:.82rem;cursor:pointer;color:var(--muted);background:transparent;
    border:1px solid var(--line);border-radius:7px;padding:.3rem .6rem}
  .segbtn:hover{background:var(--panel-2);color:var(--ink)}
  .segbtn.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script type="module">
mountNav('shift.html');
const D = window.APP_DATA;
const POS='#16a34a', NEG='#dc2626', FAINT='#94a3b8';
const LB = D.leaderboard;                       // all players, all-seasons canonical
const N = Math.max(...LB.map(r=>r.rawRank));
const eraOf = r => r.firstYear + (r.lastYear!==r.firstYear ? '–'+r.lastYear : '');

function order(mode){
  const a = LB.slice();
  if(mode==='mag') a.sort((x,y)=> Math.abs(y.delta)-Math.abs(x.delta) || y.delta-x.delta || x.adjRank-y.adjRank);
  else             a.sort((x,y)=> y.delta-x.delta || x.adjRank-y.adjRank);   // default: risers → fallers
  return a;
}

const rh=16, x0=210, W=650, xw=W-x0-52, top=38;
const xs = rk => x0+(rk-1)/(N-1)*xw;
function draw(mode){
  const rows = order(mode);
  const H = top+rh*rows.length+8;
  let s=`<svg class="db" viewBox="0 0 ${W} ${H}">`;
  s+=`<text class="hint" x="${x0}" y="20">← better rank · worse rank →</text>`;
  rows.forEach((r,i)=>{
    const y=top+i*rh, a=xs(r.rawRank), b=xs(r.adjRank), d=r.delta;
    const col = d>0?POS:(d<0?NEG:FAINT);
    const tip=`${r.name} (${eraOf(r)}): raw #${r.rawRank} → adjusted #${r.adjRank} (${d>0?'+'+d:d})`;
    s+=`<a href="player.html?p=${encodeURIComponent(r.name)}"><text class="row" x="${x0-72}" y="${y+3}" text-anchor="end">${esc(r.name)}</text></a>`;
    s+=`<text class="era" x="${x0-10}" y="${y+3}" text-anchor="end">${eraOf(r)}</text>`;
    s+=`<line x1="${a.toFixed(1)}" y1="${y}" x2="${b.toFixed(1)}" y2="${y}" stroke="${col}" stroke-width="2" opacity=".5"><title>${esc(tip)}</title></line>`;
    s+=`<circle cx="${a.toFixed(1)}" cy="${y}" r="3.4" fill="#cbd5e1"><title>${esc(r.name)} raw rank #${r.rawRank}</title></circle>`;
    s+=`<circle cx="${b.toFixed(1)}" cy="${y}" r="4" fill="${col}"><title>${esc(r.name)} adjusted rank #${r.adjRank}</title></circle>`;
    if(d!==0){
      const rt=Math.max(a,b), lf=Math.min(a,b);
      const outside = rt+28 <= W-2;                 // room to the right of the outer dot?
      const lx = outside ? rt+7 : lf-7;
      s+=`<text class="delta" x="${lx.toFixed(1)}" y="${y+3}" fill="${col}" text-anchor="${outside?'start':'end'}">${d>0?'+'+d:d}</text>`;
    }
  });
  return s+'</svg>';
}

let mode='dir';
document.getElementById('root').innerHTML = `
  <h1>Raw → Adjusted</h1>
  <p class="lede">Era-adjustment in one view: who moves when a win counts as a <strong>share of its season</strong> instead of a flat +1.
  The open dot is a player's raw-wins rank, the filled dot their era-adjusted rank.
  <span style="color:${POS}">Green</span> means a season-scarce era lifted them; <span style="color:${NEG}">red</span> means a win-rich era pulled them down.
  <a href="methodology.html">Why weight by era →</a></p>
  <div class="key"><span><span class="d" style="background:#cbd5e1"></span>raw rank</span><span><span class="d" style="background:${POS}"></span>adjusted (riser)</span><span><span class="d" style="background:${NEG}"></span>adjusted (faller)</span></div>
  <div class="sortctl">Sort:
    <button type="button" class="segbtn active" data-mode="dir">By direction</button>
    <button type="button" class="segbtn" data-mode="mag">By magnitude</button>
  </div>
  <div class="chart-wrap" id="chart">${draw(mode)}</div>
  <p class="small muted">All ${LB.length} major winners (all seasons). <strong>By direction</strong> runs biggest risers → biggest fallers; <strong>By magnitude</strong> puts the biggest movers on top regardless of direction. Hover a dot for exact ranks; click a name for their page.</p>`;

document.querySelectorAll('.segbtn').forEach(b=>b.addEventListener('click',()=>{
  mode=b.dataset.mode;
  document.querySelectorAll('.segbtn').forEach(x=>x.classList.toggle('active', x===b));
  document.getElementById('chart').innerHTML = draw(mode);
}));
mountFoot();
</script>
</body>
</html>
