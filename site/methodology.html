<style>
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
@media(max-width:760px){.cmp{grid-template-columns:1fr}}
.season-mini{margin:var(--space-1) 0}
.season-mini .top{display:flex;justify-content:space-between;font-size:var(--text-sm);color:var(--muted)}
.opt{border:1px solid var(--line);border-radius:var(--radius);padding:var(--space-4) var(--space-5);background:var(--panel)}
.opt.pick{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.opt h3{margin-top:0;display:flex;align-items:center;gap:var(--space-2)}
.formula{font-family:var(--mono);font-size:var(--text-sm);background:#fff;border:1px solid var(--line);
  border-radius:7px;padding:var(--space-2) var(--space-3);display:inline-block;margin:var(--space-1) 0}
.vs-bar{display:flex;align-items:center;gap:var(--space-2);margin:var(--space-1) 0}
.vs-bar .who{width:62px;font-size:var(--text-sm);font-weight:600}
.vs-bar .tr{flex:1;background:var(--panel-2);border-radius:5px;height:22px;position:relative}
.vs-bar .fl{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:var(--space-2);color:#fff;font-size:var(--text-sm);font-family:var(--mono);font-weight:600}
.fl.c{background:var(--accent)}.fl.s{background:var(--amber)}
.ratio-tag{font-family:var(--mono);font-weight:700;font-size:var(--text-lg)}
.tl{display:flex;align-items:flex-end;gap:3px;height:150px;margin:var(--space-4) 0;padding-top:10px;min-width:600px}
.tl .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px}
.tl .col .b{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px}
.tl .col .b.hi{background:var(--amber)}
.tl .col .cap{font-size:var(--text-xs);color:var(--faint);writing-mode:vertical-rl;transform:rotate(180deg);height:54px;white-space:nowrap;overflow:hidden}
.tl .col .nm{font-size:var(--text-xs);font-family:var(--mono);color:var(--muted)}
.qa{border-top:1px solid var(--line);margin-top:var(--space-5);padding-top:var(--space-4)}
.qa:first-of-type{border-top:none;margin-top:var(--space-2);padding-top:0}
.qa h3{margin:0 0 var(--space-2);font-size:var(--text-md)}
.qa p{margin:var(--space-2) 0}
.jump{margin:var(--space-1) 0 var(--space-4)}
.src-split{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin:var(--space-3) 0}
@media(max-width:640px){.src-split{grid-template-columns:1fr}}
.src-split .opt h3{font-size:var(--text-base);margin:0 0 var(--space-1)}
.src-split .opt .big{font-family:var(--mono);font-size:var(--text-2xl);font-weight:700}
</style>

<body>
<script src="assets/nav.js"></script>
<main class="wrap narrow" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script>
mountNav('methodology.html');
const root=document.getElementById('root');
const C=D.players['Crimsix'], S=D.players['Simp'], SC=D.players['Scump'];
const avg=D.meta.mbarAll;
const games=D.games.slice().sort((a,b)=>a.order-b.order);
const maxM=Math.max(...games.map(g=>g.denom));

// timeline of majors per season (the weighting denominator: what a team could win,
// so MW 2019 shows 9 and an in-progress season shows its full schedule)
const timeline = games.map(g=>`<div class="col">
  <div class="nm">${g.denom}</div>
  <div class="b ${g.denom>avg?'hi':''}" style="height:${(g.denom/maxM*120).toFixed(0)}px" title="${esc(g.game)}: ${g.denom} majors"></div>
  <div class="cap">${esc(g.game)}</div></div>`).join('');

// per-player season-share mini bars
function seasonMinis(p){
  return p.seasons.map(s=>`<div class="season-mini">
    <div class="top"><span>${esc(s.game)}</span><span class="num">${s.wins}/${s.majors} = ${s.share.toFixed(3)}</span></div>
    <div class="bar-track" style="height:12px"><div class="bar-fill" style="width:${(s.share*100).toFixed(1)}%"></div></div>
  </div>`).join('');
}

// options comparison numbers
const opt = [
  {k:'Raw wins (status quo)', c:C.raw, s:S.raw, fmt:v=>v.toFixed(0)},
  {k:'Pure season-share', c:C.share_all, s:S.share_all, fmt:v=>v.toFixed(2)},
  {k:'Rescaled adjusted', c:C.adj_all, s:S.adj_all, fmt:v=>v.toFixed(1)},
];
function vsBars(o){
  const mx=Math.max(o.c,o.s);
  return `<div class="vs-bar"><div class="who" style="color:var(--accent)">Crimsix</div>
      <div class="tr"><div class="fl c" style="width:${(o.c/mx*100).toFixed(0)}%">${o.fmt(o.c)}</div></div></div>
    <div class="vs-bar"><div class="who" style="color:var(--amber-ink)">Simp</div>
      <div class="tr"><div class="fl s" style="width:${(o.s/mx*100).toFixed(0)}%">${o.fmt(o.s)}</div></div></div>
    <div class="small muted" style="text-align:right">gap: <span class="ratio-tag">${(o.c/o.s).toFixed(2)}×</span></div>`;
}

const bo2=D.majors['Black Ops 2'], small=6;

root.innerHTML=`
  <h1>Methodology</h1>
  <p class="lede">This page explains the site's rules: how adjusted wins convert raw major wins into season-share value,
  how Kills Over Replacement is computed, which tournaments count, why totals can differ from other trackers, and where optional extras like ring weighting fit.
  The core adjustment is narrow: it corrects for how many majors were available in each season.</p>
  ${pageToc([
    ['era-adjustment','Adjusted wins'],
    ['season-share','Season share'],
    ['scoring-options','Scoring options'],
    ['crimsix-simp','Crimsix vs. Simp'],
    ['placement','Placement stats'],
    ['kills-over-replacement','Kills Over Replacement'],
    ['tournaments','Tournament rules']
  ])}

  <h2 id="era-adjustment">1. Adjusted wins: why season size matters ${anchorLink('era-adjustment','Adjusted wins')}</h2>
  <p>Every bar is one season. Early Call of Duty had a packed circuit: <strong>${bo2} majors in Black Ops 2</strong>,
  versus <strong>6–7</strong> in modern seasons. More events means more chances to win one.
  <span class="pill warn small">amber</span> = above the ${avg.toFixed(1)}-major average.</p>
  <p class="scrollhint small faint">Swipe the timeline sideways →</p>
  <div class="scroll-x"><div class="tl">${timeline}</div></div>
  <p class="small muted">So a player active in 2013–2015 could rack up wins a modern player never had the chance at.
  Raw totals reward <em>showing up in a busy era</em> as much as dominance.</p>

  <h2 id="season-share">2. The fix: make every season worth the same ${anchorLink('season-share','Season share')}</h2>
  <p>Treat each season as a single unit. A win is worth <span class="formula">1 ÷ (majors that season)</span>:
  your <strong>share</strong> of that season. Win 20% of a season's majors and you bank 0.20, whether that was 2-of-10 or
  3-of-15. One win is worth very different amounts depending on when it happened:</p>
  <div class="cmp">
    <div class="opt"><h3>A win in Black Ops 2</h3>
      <div class="bar-track" style="height:20px"><div class="bar-fill amber" style="width:${(1/bo2*100*3).toFixed(0)}%"></div></div>
      <p class="small">1 / ${bo2} = <strong>${(1/bo2).toFixed(3)}</strong> of a season</p></div>
    <div class="opt"><h3>A win in a 6-major season</h3>
      <div class="bar-track" style="height:20px"><div class="bar-fill" style="width:${(1/small*100*3).toFixed(0)}%"></div></div>
      <p class="small">1 / ${small} = <strong>${(1/small).toFixed(3)}</strong> of a season, worth ${(bo2/small).toFixed(1)}× as much</p></div>
  </div>

  <h2 id="scoring-options">3. Three ways you could score it ${anchorLink('scoring-options','Scoring options')}</h2>
  <div class="grid cols-3" style="margin-top:var(--space-2)">
    <div class="opt"><h3>Option 1</h3><div class="pill flat small">status quo</div>
      <p class="small">Just count wins.</p><div class="formula">total wins</div>
      <p class="small muted">Simple and familiar, but rewards era volume. This is what the wiki shows.</p></div>
    <div class="opt"><h3>Option 2</h3><div class="pill tag small">era-neutral</div>
      <p class="small">Sum of season shares.</p><div class="formula">Σ wins ÷ majors</div>
      <p class="small muted">Opportunity-normalized: each season caps at 1.0, so era no longer inflates totals. But the numbers are small and unintuitive (a legend scores ~3).</p></div>
    <div class="opt pick"><h3>Option 3 ✓</h3><div class="pill up small">chosen</div>
      <p class="small">Share, rescaled to a wins-like number.</p><div class="formula">(Σ wins ÷ majors) × ${avg.toFixed(2)}</div>
      <p class="small muted">Identical ranking to Option 2, but multiplied by the average majors-per-season so it reads on the familiar "wins" scale.</p></div>
  </div>
  <p class="small muted">We deliberately <em>didn't</em> weight by prize money or field size. Those are noisier and more subjective
  than a plain count of how many majors existed that year.</p>

  <div class="note" style="background:var(--panel);border-color:var(--line);color:var(--muted)">
    <strong>What this does and doesn't measure.</strong> It adjusts for one thing: how many chances to win a major existed each season.
    (For the one season where teams couldn't enter every major, Modern Warfare 2019's split Home Series format, we divide by the
    <strong>9</strong> each team actually played, not the 13 held. An <em>in-progress</em> season divides by its full schedule of
    majors rather than the number played so far, so current wins aren't overstated before the season finishes.)
    It does <em>not</em> account for field strength, online vs. LAN, regional depth, roster format, or prize size. Read it as
    <em>opportunity-normalized</em> major wins, not a full "who was better" verdict.
  </div>

  <h2 id="crimsix-simp">4. Head-to-head: Crimsix vs. Simp ${anchorLink('crimsix-simp','Crimsix vs. Simp')}</h2>
  <p>A clear, high-profile example. <strong style="color:var(--accent)">Crimsix</strong> piled up ${C.raw} wins, mostly in the 16–17-major
  seasons; <strong style="color:var(--amber-ink)">Simp</strong> has ${S.raw}, almost all in lean 6–7-major seasons. Neither moves much in the
  rankings, but the gap between them shrinks a lot from raw to adjusted:</p>

  <div class="grid cols-3">
    ${opt.map(o=>`<div class="opt"><h3 class="small">${o.k}</h3>${vsBars(o)}</div>`).join('')}
  </div>
  <p>By raw count Crimsix is <strong>${(C.raw/S.raw).toFixed(2)}×</strong> Simp's total. Adjust for era and that gap shrinks to
  <strong>${(C.adj_all/S.adj_all).toFixed(2)}×</strong>, because Simp's titles were each scarcer. He's still behind, just nowhere near
  ${(C.raw/S.raw).toFixed(1)}× behind.</p>

  <div class="cmp" style="margin-top:var(--space-4)">
    <div>
      <h3 style="color:var(--accent)">Crimsix: ${C.raw} wins, ${C.share_all.toFixed(2)} share → ${C.adj_all.toFixed(1)} adj</h3>
      ${seasonMinis(C)}
    </div>
    <div>
      <h3 style="color:var(--amber-ink)">Simp: ${S.raw} wins, ${S.share_all.toFixed(2)} share → ${S.adj_all.toFixed(1)} adj</h3>
      ${seasonMinis(S)}
    </div>
  </div>
  <p class="small muted">Each bar is a season share (wins ÷ that season's majors). Many of Crimsix's sit in the 16–17-major era,
  where each win is a small slice of the season; Simp's came in 6–7-major years, where each slice is much bigger.</p>

  <div class="note" style="margin-top:var(--space-6)">Want to slice by era? The <a href="index.html">leaderboard</a> has an
  <strong>"Eras"</strong> filter: pick a preset (Post-BO2, the MLG–CWL era, the CDL era) or any set of titles, and the
  adjusted numbers and ranks recompute for just those seasons. Excluding the sparse 2010–2012 pre-BO2 seasons (as few as
  3 tracked majors) is the "Post-BO2" preset.</div>

  <h2 id="placement">5. Average placement and events placed ${anchorLink('placement','Placement stats')}</h2>
  <p><strong>Average placement</strong> is a consistency stat, not part of the era-adjusted wins formula. It answers:
  when this player entered a counted major, where did their team usually finish? <strong>Events placed</strong> is the
  denominator: the number of included majors with a counted finish for that player.</p>
  <p>The source is the same normalized participation list used by the player page's <strong>Every major entered</strong>
  view. A team finish is assigned to each rostered player, non-starts like DNS/DNP/DQ are excluded, and the tournament
  universe is the same as the wins metric: console Major/Premier events on or before the as-of date, with Warzone/Mobile
  and explicitly dropped non-pro events excluded.</p>
  <p>Tied placement ranges use their midpoint: <span class="formula">5-6 → 5.5</span>,
  <span class="formula">9-12 → 10.5</span>. If the wiki lists a player more than once in the same event because of an
  open-event roster move, the best finish is used once. The leaderboard columns recompute with the Eras/title filter just
  like adjusted wins, so a CDL-only view shows only CDL-era finishes.</p>
  <p><strong>Win conversion</strong> is counted major wins divided by counted majors entered.
  <strong>Finals rate</strong> is the share of entered majors where the player finished top 2, and
  <strong>deep-run rate</strong> is the share where the player finished top 4. These are resume-context stats, not ranking
  inputs. They are useful for comparing consistency and conversion, but top-2/top-4 rates are not fully field-size-normalized:
  a top 4 in an 8-team playoff is not identical to a top 4 in a large open bracket.</p>

  <h2 id="kills-over-replacement">6. Kills Over Replacement ${anchorLink('kills-over-replacement','Kills Over Replacement')}</h2>
  <p><strong>Kills Over Replacement</strong> is a rate stat for the on-record map database. It asks:
  how many more kills per map did this player produce than a replacement-level qualified player in the same title and mode?
  The public leaderboard shows two separate splits because the kill environment is different:
  <strong>Respawn KOR/map</strong> and <strong>S&amp;D KOR/map</strong>.</p>
  <p>The formula is intentionally simple:</p>
  <div class="formula">KOR/map = player kills per map − replacement kills per map</div>
  <p><strong>Replacement</strong> is the 25th percentile kills per map among qualified players in that title and mode split.
  In other words, it is not a universal number. Black Ops 4 Respawn has its own baseline, Advanced Warfare S&amp;D has its
  own baseline, and the all-time view compares each player to the replacement baseline from their own title/mode row.</p>
  <p>The qualification filters are there to keep tiny samples from driving the board: <strong>28+ Respawn maps</strong>
  or <strong>10+ S&amp;D maps</strong> in a title. Rows with relatively small qualified samples are still shown, but marked
  as fragile context. The score is built from major-event maps only, using kills and maps from the objective-stat source
  coverage available for that title.</p>
  <p>Opponent context is shown beside the score but is not baked into it. <strong>Median opponent placement</strong> is the
  median event finish of the teams a player faced in those maps. <strong>Top-8 opponent map share</strong> is the share of
  maps against teams that placed top 8 at that event. Those fields help identify easier or harder paths, but we do not yet
  adjust the KOR number for opponent strength.</p>
  <p><strong>How to read it:</strong> KOR is a contextualized kill-production rate, not a full WAR-style value model.
  It does not include damage, objective work, trading, comms, role, team system, or map wins. It is most useful as a cleaner
  version of kills per map: title-adjusted, mode-split, and sample-aware. It should sit beside resume metrics, not replace them.
  <a href="kor.html">Open the KOR leaderboard →</a></p>

  <a id="data-source"></a>
  <h2 id="tournaments">7. Which tournaments count, and who decides ${anchorLink('tournaments','Tournament rules')}</h2>
  <p class="lede" style="font-size:var(--text-md)"><strong>The short version: we don't decide.</strong> An event counts here if and only if
  the CoD Esports Wiki tags it <strong>Major</strong> or <strong>Premier</strong> tier and the player finished 1st. That's it. We mirror the
  wiki's <a href="https://cod-esports.fandom.com/wiki/List_of_Most_Major_Tournament_Wins_by_Player">Major Wins list</a>, the community's
  generally-accepted source of truth, and stay out of the "was that event <em>really</em> a major?" debate entirely.</p>
  <p>This is deliberate. The moment we start hand-picking which majors are "legit", say by dropping an EGL here or an online event there, the
  number stops being reproducible and just becomes <em>our</em> opinion. Deferring to one public, editable list means anyone can check the
  math, and the rankings move only when the source does. The full set of qualifying events is the wiki's
  <a href="https://cod-esports.fandom.com/wiki/Portal:Tournaments/Majors">Majors portal</a>; think an event is wrongly in or out? That's a
  case for the wiki editors: fix it there and it flows through here automatically.</p>

  <div class="qa">
    <h3>"Doesn't Scump have 30 wins, not 28?"</h3>
    <p>This is the most common question, and the confusion is real, because <strong>the wiki itself shows both numbers in different
    places.</strong> They come from two kinds of page that work completely differently:</p>
    <div class="src-split">
      <div class="opt pick">
        <h3>Major Wins list <span class="pill up small">database-generated</span></h3>
        <div class="big">${SC?SC.raw:28}</div>
        <p class="small muted">A live query against the wiki's database (Major/Premier tier, 1st place). Reproducible: run it yourself and you
        get the same number. This is what we use. Scump: nine major-tier + nineteen premier-tier wins.</p>
      </div>
      <div class="opt">
        <h3>"Winningest Players" pages <span class="pill warn small">hand-typed</span></h3>
        <div class="big">30 <span class="small muted">/ 28</span></div>
        <p class="small muted">Static tables a person types by hand, on different dates, with looser rules ("offline/LAN events," not strictly
        major-tier). The North America page says 30; the World page says 28. The two don't even agree with each other (aBeZy and Simp show 14
        on one, 13 on the other).</p>
      </div>
    </div>
    <p>Third-party trackers like breakingpoint reach 30 the same way: a broader, manually-curated definition that sweeps in a couple of
    events the wiki classifies as minors (the usual suspects: UMG Fort Lee 2012, Frag Cup III), or counts home-series/legacy events
    differently. None of it is wrong exactly. It's just a <em>different, hand-maintained rule</em>. We use the database-generated list because
    it's the one total anyone can reproduce without trusting our judgment.</p>
  </div>

  <div class="qa">
    <h3>"Then drop the homestands / online champs / EGLs / Melbourne."</h3>
    <p>Same answer, every time: if the wiki tiers it as a major, it counts; if it doesn't, it doesn't. We're not going to relitigate EGL
    Blackpool or Crown Melbourne or the 2020 Home Series one tournament at a time. That bottomless argument is <em>exactly</em> what deferring
    to a single source avoids. (The 2020 Home Series does get one adjustment, but only to the era <em>denominator</em> (see §3),
    never to whether those wins count.)</p>
  </div>

  <div class="qa">
    <h3>"You're rewarding online / COVID-era wins."</h3>
    <p>We don't weight online vs. LAN at all. The source counts the 2020–21 online majors as majors, so they count here too. Baking in an
    "online discount" would mean re-deciding the tournament list ourselves (the one thing this project won't do), and it would have to hit
    <em>everyone</em> who won online, not just the players a given argument wants to dock.</p>
  </div>

  <div class="qa">
    <h3>"Shouldn't a Championship be worth more than a regular major?"</h3>
    <p>By default it's treated like any other major. A World Championship is simply one of that season's majors. Whether a ring is worth
    <em>more</em> is subjective, so rather than bake in a number we made it a knob: the <a href="index.html">leaderboard</a>'s optional
    <strong>"Ring weight"</strong> slider lets you set a ring worth up to 6 regular majors and re-ranks by an <strong>"Adj +◆"</strong> total.
    It's off by default and never touches the neutral era-adjusted number.</p>
  </div>

  <div class="note" style="margin-top:var(--space-5)">
    <strong>Bottom line.</strong> This site answers one precise, checkable question: <em>of the majors the wiki recognizes each season, what
    share did this player win, adjusted so every season counts equally?</em> If you disagree with which tournaments are on that list, you're
    not really disagreeing with this project; you're disagreeing with the source, and that's the right place to take it up.
  </div>
`;
mountFoot();
scrollToHashTarget();
</script>
</body>
</html>
