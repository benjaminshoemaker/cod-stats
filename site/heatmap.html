<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dominance heatmap · CoD Era-Adjusted</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<meta name="description" content="Every top CoD player's share of each title's majors, as a heatmap. See who owned which era. Gold marks a World Championship season.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="CoD Major Wins · Era-Adjusted">
<meta property="og:title" content="Dominance heatmap · CoD majors by era">
<meta property="og:description" content="Each player's share of every title's majors. See who owned which era. Gold marks a World Championship win.">
<meta property="og:url" content="https://cod-stats-one.vercel.app/heatmap.html">
<meta property="og:image" content="https://cod-stats-one.vercel.app/api/og">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://cod-stats-one.vercel.app/api/og">
<link rel="stylesheet" href="assets/style.css">
<link rel="preload" href="assets/nav.js" as="script">
<script src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js"
  integrity="sha384-Osd4ws6GMOft3r45orGjXi52w62BlTXpUzyK7/1Uk4v9xe0hhJD5rFJKDjFpM5Pv" crossorigin="anonymous"></script>
<style>
  /* sequential ramp endpoints — read by the cell colorer AND the legend gradient,
     so retuning the ramp can't desync them */
  :root{--seq0:#eaf1fe;--seq1:#1e3a8a}
  .chart-wrap{overflow-x:auto;position:relative}
  /* min-width matches the viewBox width so in-SVG text never renders below authored size */
  svg.hm{display:block;min-width:948px;width:100%;height:auto;font-family:var(--sans)}
  svg.hm .col{fill:var(--muted);font-size:9.5px}
  svg.hm .row{fill:var(--ink);font-size:12px}
  svg.hm a{cursor:pointer}
  svg.hm a:hover .row{text-decoration:underline;fill:var(--accent)}
  svg.hm .cell{cursor:default}
  svg.hm .pct{font-size:9.5px;pointer-events:none}
  .swatches{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--muted);margin:var(--space-1) 0 var(--space-1)}
  .swatches .ramp{display:inline-block;width:120px;height:12px;border-radius:3px;
    background:linear-gradient(90deg,var(--seq0),var(--seq1))}
</style>
</head>
<body>
<script src="assets/nav.js"></script>
<main class="wrap wide" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script type="module">
import { eraContext, computeRows } from './assets/rank.js';
mountNav('heatmap.html');
const D = window.APP_DATA;
// design tokens: championship gold + the sequential ramp (single source of truth)
const css = getComputedStyle(document.documentElement);
const GOLD = css.getPropertyValue('--gold').trim();
const SEQ0 = css.getPropertyValue('--seq0').trim(), SEQ1 = css.getPropertyValue('--seq1').trim();
const { PRESETS } = eraContext(D);
const ORDER = D.meta.seasonOrder;
const GAMES = Object.fromEntries(D.games.map(g=>[g.game,g]));
const ABBR = Object.fromEntries(ORDER.map(g=>[g, window.GAME_ABBR[g]||g]));

// event -> season (shared, from app.js), so a World-Championship win marks the right cell
const event2game = window.EVENT2GAME;

const seq=t=>mixHex(SEQ0,SEQ1,Math.max(0,Math.min(1,t)));

const rows = computeRows(D, new Set(PRESETS.all), 1).sort((a,b)=>a.adjRank-b.adjRank).slice(0,16);
const seasonOf = {}, champGames = {};
for(const r of rows){
  const p = D.players[r.name];
  seasonOf[r.name] = Object.fromEntries(p.seasons.map(s=>[s.game,s]));
  champGames[r.name] = new Set((p.champ_events||[]).map(c=>event2game[c.event]).filter(Boolean));
}
let mx=0; for(const r of rows) for(const g of ORDER) mx=Math.max(mx, seasonOf[r.name][g]?.share||0);

const cw=44, rh=28, x0=140, y0=64, W=x0+cw*ORDER.length+16, H=y0+rh*rows.length+14;
let s=`<svg class="hm" viewBox="0 0 ${W} ${H}" role="img" aria-label="Dominance heatmap of the top 16 players by era-adjusted wins. Each cell is a player's share of that title's majors; darker cells mean more of the season won, and gold dots mark seasons they won the World Championship.">`;
ORDER.forEach((g,j)=>{const x=x0+j*cw+cw/2;
  s+=`<text class="col" x="${x}" y="${y0-8}" transform="rotate(-45 ${x} ${y0-8})" text-anchor="start">${esc(ABBR[g])}</text>`;});
rows.forEach((r,i)=>{
  const y=y0+i*rh; const nm=r.name;
  s+=`<a href="player.html?p=${encodeURIComponent(nm)}"><text class="row" x="${x0-8}" y="${y+rh/2+4}" text-anchor="end">${esc(nm)}</text></a>`;
  ORDER.forEach((g,j)=>{
    const season=seasonOf[nm][g], v=season?.share||0, x=x0+j*cw, isChamp=champGames[nm].has(g);
    const wins=season?.wins||0, majors=season?.majors||GAMES[g].denom;
    const fill=v>0?seq(v/mx):'#f8fafc';
    const tip=v>0?`${nm}, ${ABBR[g]}: ${wins}/${majors} majors (${Math.round(v*100)}%)${isChamp?' · World Champion':''}`:`${nm}, ${ABBR[g]}: no majors`;
    s+=`<rect class="cell" x="${x+1}" y="${y+1}" width="${cw-2}" height="${rh-2}" rx="4" fill="${fill}" data-tip="${esc(tip)}"></rect>`;
    if(v>=0.30 || (isChamp && v>0)){
      // flip to white only where white actually reaches AA on the interpolated ramp (~t 0.62)
      const dark=v/mx>0.62; s+=`<text class="pct" x="${x+cw/2}" y="${y+rh/2+4}" text-anchor="middle" fill="${dark?'#fff':'var(--ink)'}">${Math.round(v*100)}</text>`;
    }
    if(isChamp) s+=`<circle cx="${x+cw-6}" cy="${y+6}" r="3.4" fill="${GOLD}" stroke="#fff" stroke-width="1"><title>${esc(nm)} won the ${ABBR[g]} World Championship</title></circle>`;
  });
});
s+='</svg>';

// keyboard/AT (and touch) alternative: the same numbers as an HTML table
let tbl = `<table class="data">${tableCaption('Dominance heatmap table alternative')}<thead><tr><th scope="col">Player</th>${ORDER.map(g=>`<th scope="col" class="n">${esc(ABBR[g])}</th>`).join('')}</tr></thead><tbody>`;
for(const r of rows){
  tbl += `<tr><th scope="row"><a href="player.html?p=${encodeURIComponent(r.name)}">${esc(r.name)}</a></th>`;
  for(const g of ORDER){
    const season=seasonOf[r.name][g], v=season?.share||0, isChamp=champGames[r.name].has(g);
    tbl += `<td class="n">${v>0?`${season.wins}/${season.majors}${isChamp?' ◆':''}`:'<span class="faint">–</span>'}</td>`;
  }
  tbl += '</tr>';
}
tbl += '</tbody></table>';

document.getElementById('root').innerHTML = `
  <h1>Dominance heatmap</h1>
  <p class="lede">Each cell is a player's <strong>share of that title's majors</strong>, the same season-share the leaderboard is built on.
  Darker = more of the season won. A <span style="color:${GOLD}">◆ gold dot</span> marks a season they won the World Championship.
  Read a row for a career, a column for who owned that title. <a href="methodology.html#era-adjustment">How adjusted wins work →</a></p>
  <div class="swatches"><span>0%</span><span class="ramp"></span><span>${Math.round(mx*100)}% of a season won, the highest here (color is scaled to it)</span></div>
  <p class="scrollhint small faint">Swipe the chart sideways →</p>
  <div class="chart-wrap">${s}</div>
  <p class="small muted">Top 16 by era-adjusted wins (all seasons). Hover or tap a cell for the exact wins.</p>
  <details class="sim-method"><summary>View as a table (wins / majors, ◆ = World Championship season)</summary>
    <div ${scrollRegionAttrs('Dominance heatmap table alternative')} style="margin-top:var(--space-2)">${tbl}</div></details>`;

// styled HTML tooltip: instant, works on tap, and replaces the slow native <title>
const wrapEl = document.querySelector('.chart-wrap');
const tipEl = document.createElement('div');
tipEl.className = 'charttip'; wrapEl.appendChild(tipEl);
wrapEl.addEventListener('mouseover', e=>{
  const c = e.target.closest('rect.cell');
  if(!c || !c.dataset.tip){ tipEl.classList.remove('on'); return; }
  tipEl.textContent = c.dataset.tip; tipEl.classList.add('on');
  const wr = wrapEl.getBoundingClientRect(), cr = c.getBoundingClientRect();
  let x = cr.left - wr.left + wrapEl.scrollLeft + cr.width/2 - tipEl.offsetWidth/2;
  x = Math.max(4, Math.min(x, wrapEl.scrollWidth - tipEl.offsetWidth - 4));
  let y = cr.top - wr.top - tipEl.offsetHeight - 8;
  if(y < 0) y = cr.bottom - wr.top + 8;
  tipEl.style.left = x+'px'; tipEl.style.top = y+'px';
});
wrapEl.addEventListener('mouseleave', ()=>tipEl.classList.remove('on'));
mountFoot();
</script>
</body>
</html>
