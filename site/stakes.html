<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Championship Stakes | Map Five</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="canonical" href="https://mapfive.app/stakes.html">
<meta name="description" content="What-if rank movement for the next Call of Duty major: who moves on the Map Five leaderboard if each current roster wins.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Map Five">
<meta property="og:title" content="Championship Stakes">
<meta property="og:description" content="What-if rank movement for the next Call of Duty major.">
<meta property="og:url" content="https://mapfive.app/stakes.html">
<meta property="og:image" content="https://mapfive.app/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://mapfive.app/assets/og.png">
<link rel="stylesheet" href="assets/style.css">
<link rel="preload" href="assets/nav.js" as="script">
</head>
<body>
<script src="assets/nav.js"></script>
<main class="wrap wide" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script>
mountNav('stakes.html');
const root = document.getElementById('root');
const stakes = D.stakes || {};

function teamHref(team){
  const params = new URLSearchParams({t: team});
  return `stakes.html?${params.toString()}`;
}
function signed(n){
  if(n > 0) return `+${n}`;
  if(n < 0) return String(n);
  return '0';
}
function deltaPill(n){
  if(n > 0) return `<span class="pill up">▲ ${n}</span>`;
  if(n < 0) return `<span class="pill down">▼ ${Math.abs(n)}</span>`;
  return `<span class="pill flat">0</span>`;
}
function renderEmpty(){
  root.innerHTML = `<h1>Championship Stakes</h1>
    <p class="lede">No future scheduled console major is available in the current source snapshot.</p>`;
  mountFoot();
}
function render(){
  if(stakes.status !== 'ready' || !stakes.scenarios?.length){ renderEmpty(); return; }
  const params = new URLSearchParams(location.search);
  const selectedTeam = params.get('t');
  const scenario = stakes.scenarios.find(s => s.team === selectedTeam) || stakes.scenarios[0];
  const ev = stakes.event;
  if(selectedTeam !== scenario.team && !params.has('t')){
    history.replaceState(null, '', teamHref(scenario.team));
  }
  const links = stakes.scenarios.map(s => {
    const active = s.team === scenario.team ? ' active' : '';
    return `<a class="${active}" href="${teamHref(s.team)}"><span>${esc(s.team)}</span><span>${s.playerCount}</span></a>`;
  }).join('');
  const rows = scenario.players.map(p => `<tr>
    <th scope="row"><a href="player.html?p=${encodeURIComponent(p.name)}">${esc(p.name)}</a></th>
    <td class="n">#${p.rankBefore} -> #${p.rankAfter}</td>
    <td class="n">${deltaPill(p.rankDelta)}</td>
    <td class="n">${p.adjustedBefore.toFixed(2)} -> ${p.adjustedAfter.toFixed(2)}</td>
    <td class="n"><strong>${signed(p.adjustedDelta.toFixed(2))}</strong></td>
    <td class="n">${p.rawBefore} -> ${p.rawAfter}</td>
    <td class="n">${p.champsBefore} -> ${p.champsAfter}</td>
  </tr>`).join('');
  root.innerHTML = `
    <h1>Championship Stakes</h1>
    <p class="lede">A what-if view for <strong>${esc(ev.event)}</strong>: if each current ${esc(ev.game)}
    roster wins the next major, these are the exact rank movements on the era-adjusted leaderboard.</p>
    <div class="note">
      <strong>No current ranking changes here.</strong> ${esc(ev.game)} already uses a ${ev.denominator}-major
      denominator, so every scenario adds exactly 1/${ev.denominator} of the season, or
      <strong>+${ev.adjustedDelta.toFixed(2)}</strong> adjusted wins, to each listed player.
      ${ev.isChamps ? 'Because this event is Champs, each listed player also gets +1 ring in the scenario.' : ''}
    </div>
    <div class="stakes-summary">
      <div class="stat"><div class="k">Event</div><div class="v sm">${esc(ev.event)}</div></div>
      <div class="stat"><div class="k">Date</div><div class="v sm">${esc(ev.date)}</div></div>
      <div class="stat"><div class="k">Per-player delta</div><div class="v sm">+${ev.adjustedDelta.toFixed(2)}</div></div>
      <div class="stat"><div class="k">Scenarios</div><div class="v sm">${stakes.scenarios.length}</div></div>
    </div>
    <div class="stakes-layout">
      <nav class="stakes-team-list" aria-label="Team scenarios">${links}</nav>
      <section>
        <h2>${esc(scenario.team)}</h2>
        <p class="small muted">Roster source: ${esc(scenario.rosterAsOf.event)} (${esc(scenario.rosterAsOf.date)}).
        Only players on the Map Five leaderboard are shown.</p>
        <div id="stakes-table">
          ${TableSurface.dataTable({
            label: `${scenario.team} stakes scenario`,
            caption: `${scenario.team} what-if rank movement`,
            head: `<thead><tr><th scope="col">Player</th><th scope="col" class="n">Rank</th><th scope="col" class="n">Move</th>
              <th scope="col" class="n">Adjusted</th><th scope="col" class="n">Delta</th><th scope="col" class="n">Raw</th><th scope="col" class="n">Champs</th></tr></thead>`,
            rows
          })}
        </div>
        <p class="small muted stakes-note">Ranks use the same exact-fraction competition ranking as the main leaderboard.
        Ties share the minimum rank, and rounded display values are not used for ordering.</p>
      </section>
    </div>`;
  mountFoot();
}
render();
</script>
</body>
</html>
