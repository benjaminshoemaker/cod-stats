<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Peak vs Longevity · Map Five</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="canonical" href="https://mapfive.app/scatter.html">
<meta name="description" content="Every CoD major winner plotted by peak (best title-winning season) against longevity (distinct titles won), era-adjusted. Measured by winning, not individual stats.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Map Five">
<meta property="og:title" content="Peak vs Longevity · CoD majors">
<meta property="og:description" content="Who won the most in a single season vs who kept winning across the most eras, era-adjusted. Two axes, one chart.">
<meta property="og:url" content="https://mapfive.app/scatter.html">
<meta property="og:image" content="https://mapfive.app/api/og">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://mapfive.app/api/og">
<link rel="stylesheet" href="assets/style.css">
<link rel="preload" href="assets/nav.js" as="script">
<script src="https://browser.sentry-cdn.com/10.62.0/bundle.feedback.min.js"
  integrity="sha384-Osd4ws6GMOft3r45orGjXi52w62BlTXpUzyK7/1Uk4v9xe0hhJD5rFJKDjFpM5Pv" crossorigin="anonymous"></script>
<style>
  .scatter-wrap{overflow-x:auto}
  /* min-width matches the viewBox width so in-SVG text never renders below authored size */
  svg.scatter{display:block;min-width:900px;width:100%;height:auto;font-family:var(--sans)}
  svg.scatter .axis{stroke:var(--line-2);stroke-width:1}
  svg.scatter .grid{stroke:var(--line);stroke-width:1}
  svg.scatter .tick{fill:var(--muted);font-size:12px}
  svg.scatter .axlabel{fill:var(--ink);font-size:13px;font-weight:600}
  svg.scatter .quad{fill:var(--faint);font-size:12px;font-weight:600;opacity:.7}
  svg.scatter .dot{fill:var(--accent);fill-opacity:.55;stroke:#fff;stroke-width:1;cursor:pointer}
  svg.scatter .dot:hover,svg.scatter a:hover .dot,svg.scatter a:focus-visible .dot{fill-opacity:.9}
  svg.scatter a:focus-visible .dot{stroke:var(--ink);stroke-width:2}
  svg.scatter .dot.champ{fill:var(--gold);fill-opacity:.6}
  svg.scatter .hit{fill:transparent;stroke:none}
  svg.scatter .lbl{fill:var(--ink);font-size:12px;pointer-events:none}
  svg.scatter a{cursor:pointer}
</style>
</head>
<body>
<script src="assets/nav.js"></script>
<main class="wrap" id="root" tabindex="-1"></main>
<script src="data.js"></script>
<script src="assets/app.js"></script>
<script>
mountNav('scatter.html');
const root=document.getElementById('root');

root.innerHTML=`
  <h1>Peak vs. Longevity</h1>
  <p class="lede">Two players can share an adjusted total and have completely different résumés. This splits it into two
  axes, both measured by <strong>winning</strong> (tournament wins, not individual stats).
  <strong>Peak</strong> = your most dominant <em>title-winning</em> season (the biggest share of that season's majors you took);
  <strong>longevity</strong> = how many different CoD titles you kept winning majors across.
  Shares divide by the majors a team could win that season. <a href="methodology.html">How the season share works →</a></p>
  <div class="controls">
    <span class="small muted">Hover or tap a dot for detail; click it (tap again on touch) to open the player.</span>
  </div>
  <div class="legend">
    <span><span class="sw" style="background:var(--gold);border-radius:50%"></span>won a World Championship</span>
    <span><span class="sw" style="background:var(--accent);border-radius:50%;opacity:.6"></span>no Championship</span>
    <span>bubble size = total adjusted wins</span>
  </div>
  <p class="scrollhint small faint">Swipe the chart sideways →</p>
  <div class="scatter-wrap"><div id="chart"></div></div>
  <p class="small muted" style="margin-top:var(--space-4)"><strong>How to read it:</strong> top-right = won big <em>and</em> kept winning
  (the all-time résumés). Top-left = a huge winning season over a short window. Bottom-right = long careers built on steady
  winning rather than one dominant season.</p>
`;

const W=900, H=560, mL=58, mR=26, mT=28, mB=52;
const plotW=W-mL-mR, plotH=H-mT-mB;

function render(){
  const rows=D.leaderboard.map(r=>{
    const info = r.peakInfoAll;
    return {
      name:r.name,
      peak: (info && info.majors) ? info.wins/info.majors : 0,   // share of best season's majors
      eras: r.titlesAll,
      adj:  r.adjAll,
      champs:r.champs, info,
    };
  }).filter(p=>p.eras>0 && p.peak>0);

  const xMax=Math.max(...rows.map(p=>p.eras));
  const maxShare=Math.max(...rows.map(p=>p.peak));
  const yMax=Math.min(1, Math.ceil((maxShare+0.04)/0.2)*0.2);   // round up to a 0.2 step
  const maxAdj=Math.max(...rows.map(p=>p.adj));
  const xS=e=>mL+((e-1)/(Math.max(1,xMax-1)))*plotW;
  const yS=p=>mT+plotH-(p/yMax)*plotH;
  const rS=a=>4+Math.sqrt(a/maxAdj)*11;   // area ∝ adjusted wins, so big careers don't overwhelm

  // label the notable ones: top 16 by adjusted, plus the peak and longevity leaders
  const byAdj=[...rows].sort((a,b)=>b.adj-a.adj);
  const labelSet=new Set(byAdj.slice(0,16).map(p=>p.name));
  labelSet.add([...rows].sort((a,b)=>b.peak-a.peak)[0].name);
  labelSet.add([...rows].sort((a,b)=>b.eras-a.eras)[0].name);

  // grid + ticks
  let g='';
  for(let e=1;e<=xMax;e++){const x=xS(e);g+=`<line class="grid" x1="${x}" y1="${mT}" x2="${x}" y2="${mT+plotH}"/><text class="tick" x="${x}" y="${mT+plotH+18}" text-anchor="middle">${e}</text>`;}
  for(let p=0;p<=yMax+1e-9;p+=0.2){const y=yS(p);g+=`<line class="grid" x1="${mL}" y1="${y}" x2="${mL+plotW}" y2="${y}"/><text class="tick" x="${mL-8}" y="${y+4}" text-anchor="end">${Math.round(p*100)}%</text>`;}
  // axes
  g+=`<line class="axis" x1="${mL}" y1="${mT+plotH}" x2="${mL+plotW}" y2="${mT+plotH}"/><line class="axis" x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT+plotH}"/>`;
  // axis labels
  g+=`<text class="axlabel" x="${mL+plotW/2}" y="${H-12}" text-anchor="middle">Longevity →  distinct CoD titles won</text>`;
  g+=`<text class="axlabel" transform="translate(16,${mT+plotH/2}) rotate(-90)" text-anchor="middle">Peak →  % of best season's majors won</text>`;
  // quadrant hints
  g+=`<text class="quad" x="${mL+plotW-6}" y="${mT+16}" text-anchor="end">peak + longevity</text>`;
  g+=`<text class="quad" x="${mL+6}" y="${mT+16}" text-anchor="start">huge peak, short window</text>`;
  g+=`<text class="quad" x="${mL+plotW-6}" y="${mT+plotH-8}" text-anchor="end">long career, lower peak</text>`;

  // dots, plotted at exact (longevity, peak); smallest first so big ones draw on top
  const GAMES=Object.fromEntries(D.games.map(g=>[g.game,g]));
  const sorted=[...rows].sort((a,b)=>a.adj-b.adj);
  let dots='';
  for(const p of sorted){
    const x=xS(p.eras), y=yS(p.peak), r=rS(p.adj);
    // where a season's scoring denominator differs from the events held (MW19's
    // split format, an in-progress season), say so instead of looking miscounted
    const held=GAMES[p.info.season]?.majors;
    const denomNote=(held && held!==p.info.majors)?` winnable (${held} held)`:'';
    const tip=`${p.name}: best season ${p.info.wins} of ${p.info.majors}${denomNote} in ${p.info.season} (${(p.peak*100).toFixed(0)}%), ${p.eras} titles, ${p.adj.toFixed(1)} adjusted`;
    dots+=`<a href="player.html?p=${encodeURIComponent(p.name)}" aria-label="${esc(tip)}">
      <circle class="dot ${p.champs?'champ':''}" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" data-tip="${esc(tip)}"></circle>
      <circle class="hit" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${Math.max(23,r+8).toFixed(1)}" data-tip="${esc(tip)}"></circle>
    </a>`;
  }

  // labels in a separate layer; nudge down to avoid overlap (dots stay on their exact spot)
  const labels=[...rows].filter(p=>labelSet.has(p.name))
    .map(p=>({name:p.name, x:xS(p.eras), y:yS(p.peak), r:rS(p.adj)}))
    .sort((a,b)=> a.x-b.x || a.y-b.y);
  const placed=[]; let lbl='';
  for(const L of labels){
    const right = L.x > mL+plotW*0.72;                 // flip left near the right edge so labels don't clip
    let ly = L.y + 4;
    for(const q of placed){ if(Math.abs(q.x-L.x)<60 && Math.abs(q.ly-ly)<13) ly=q.ly+13; }
    placed.push({x:L.x, ly});
    const lx = right ? (L.x-L.r-4) : (L.x+L.r+4);
    lbl+=`<text class="lbl" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${right?'end':'start'}">${esc(L.name)}</text>`;
  }

  document.getElementById('chart').innerHTML=`<svg class="scatter" viewBox="0 0 ${W} ${H}" role="img" aria-label="Peak vs longevity scatter">${g}${dots}${lbl}</svg>`;
}

render();

// styled HTML tooltip on hover, tap AND keyboard focus (the dots are links, so
// they're tabbable); replaces the slow, mouse-only native <title>
const chartEl = document.getElementById('chart');
const tipEl = document.createElement('div');
tipEl.className = 'charttip fixed'; document.body.appendChild(tipEl);
function showDotTip(c){
  tipEl.textContent = c.dataset.tip; tipEl.classList.add('on');
  const r = c.getBoundingClientRect();
  let x = r.left + r.width/2 - tipEl.offsetWidth/2;
  x = Math.max(8, Math.min(x, innerWidth - tipEl.offsetWidth - 8));
  let y = r.top - tipEl.offsetHeight - 8;
  if(y < 8) y = r.bottom + 8;
  tipEl.style.left = x+'px'; tipEl.style.top = y+'px';
}
const hideDotTip = ()=>tipEl.classList.remove('on');
chartEl.addEventListener('mouseover', e=>{
  const c = e.target.closest('a')?.querySelector('circle.dot'); c ? showDotTip(c) : hideDotTip(); });
chartEl.addEventListener('mouseleave', hideDotTip);
chartEl.addEventListener('focusin', e=>{
  const c = e.target.closest('a')?.querySelector('circle.dot'); if(c) showDotTip(c); });
chartEl.addEventListener('focusout', hideDotTip);
// touch: first tap inspects, tapping the same dot again opens the player
let lastTap = null;
chartEl.addEventListener('click', e=>{
  if(!window.matchMedia('(hover: none)').matches) return;
  const a = e.target.closest('a'); if(!a) return;
  if(a !== lastTap){
    e.preventDefault(); lastTap = a;
    const c = a.querySelector('circle.dot'); if(c) showDotTip(c);
  }
});
mountFoot();
</script>
</body>
</html>
